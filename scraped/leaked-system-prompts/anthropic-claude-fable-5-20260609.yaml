  }, {\"type\": \"null\"}],\n          \"description\": \"Suggested arrival time (e.g.,\
  \ '9:00 AM')\",\n          \"title\": \"Arrival Time\"\n        },\n        \"duration_minutes\"\
  : {\n          \"anyOf\": [{\"type\": \"integer\"}, {\"type\": \"null\"}],\n   \
  \       \"description\": \"Suggested time at location in minutes\",\n          \"\
  title\": \"Duration Minutes\"\n        },\n        \"latitude\": {\"description\"\
  : \"Latitude coordinate\", \"title\": \"Latitude\", \"type\": \"number\"},\n   \
  \     \"longitude\": {\"description\": \"Longitude coordinate\", \"title\": \"Longitude\"\
  , \"type\": \"number\"},\n        \"name\": {\"description\": \"Display name of\
  \ the location\", \"title\": \"Name\", \"type\": \"string\"},\n        \"notes\"\
  : {\n          \"anyOf\": [{\"type\": \"string\"}, {\"type\": \"null\"}],\n    \
  \      \"description\": \"Tour guide tip or insider advice\",\n          \"title\"\
  : \"Notes\"\n        },\n        \"place_id\": {\n          \"anyOf\": [{\"type\"\
  : \"string\"}, {\"type\": \"null\"}],\n          \"description\": \"Google Place\
  \ ID. If provided, backend fetches full details.\",\n          \"title\": \"Place\
  \ Id\"\n        }\n      },\n      \"required\": [\"latitude\", \"longitude\", \"\
  name\"],\n      \"title\": \"MapLocationInput\",\n      \"type\": \"object\"\n \
  \   }\n  },\n  \"additionalProperties\": false,\n  \"description\": \"Input parameters\
  \ for display_map_tool.\\n\\nMust provide either `locations` (simple markers) or\
