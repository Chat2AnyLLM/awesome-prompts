  \        \"type\": \"object\"\n      },\n      \"minItems\": 1,\n      \"type\"\
  : \"array\"\n    }\n  },\n  \"required\": [\"kind\", \"variants\"],\n  \"type\"\
  : \"object\"\n}\n```\n\n### places_map_display_v0\n\nDescription:\n\n```text\nDisplay\
  \ locations on a map with your recommendations and insider tips.\n\nWORKFLOW:\n\
