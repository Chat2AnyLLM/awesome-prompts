  : \"string\"}, {\"type\": \"null\"}],\n          \"description\": \"Short evocative\
  \ title (e.g., 'Temple Hopping')\",\n          \"title\": \"Title\"\n        }\n\
  \      },\n      \"required\": [\"day_number\", \"locations\"],\n      \"title\"\
