  **[^1]: [Built-in React Hooks – React](https://react.dev/reference/react/hooks)**\n\
  ## Effect Hooks[](#effect-hooks \"Link for Effect Hooks \")  \n_Effects_ let a component\
  \ [connect to and synchronize with external systems.](/learn/synchronizing-with-effects)\
  \ This includes dealing with network, browser DOM, animations, widgets written using\
  \ a different UI library, and other non-React code.  \n*   [`useEffect`](/reference/react/useEffect)\
  \ connects a component to an external system.  \nfunction ChatRoom({ roomId }) {\
  \  useEffect(() => {    const connection = createConnection(roomId);    connection.connect();\
  \    return () => connection.disconnect();  }, [roomId]);  // ...  \nEffects are\
  \ an \"escape hatch\" from the React paradigm. Don't use Effects to orchestrate\
  \ the data flow of your application. If you're not interacting with an external\
  \ system, [you might not need an Effect.](/learn/you-might-not-need-an-effect) \
  \ \nThere are two rarely used variations of `useEffect` with differences in timing:\
  \  \n*   [`useLayoutEffect`](/reference/react/useLayoutEffect) fires before the\
  \ browser repaints the screen. You can measure layout here.\n*   [`useInsertionEffect`](/reference/react/useInsertionEffect)\
  \ fires before React makes changes to the DOM. Libraries can insert dynamic CSS\
  \ here.  \n* * *\n## Performance Hooks[](#performance-hooks \"Link for Performance\
  \ Hooks \")  \nA common way to optimize re-rendering performance is to skip unnecessary\
  \ work. For example, you can tell React to reuse a cached calculation or to skip\
  \ a re-render if the data has not changed since the previous render.  \nTo skip\
  \ calculations and unnecessary re-rendering, use one of these Hooks:  \n*   [`useMemo`](/reference/react/useMemo)\
  \ lets you cache the result of an expensive calculation.\n*   [`useCallback`](/reference/react/useCallback)\
  \ lets you cache a function definition before passing it down to an optimized component.\
  \  \nfunction TodoList({ todos, tab, theme }) {  const visibleTodos = useMemo(()\
  \ => filterTodos(todos, tab), [todos, tab]);  // ...}  \nSometimes, you can't skip\
  \ re-rendering because the screen actually needs to update. In that case, you can\
  \ improve performance by separating blocking updates that must be synchronous (like\
  \ typing into an input) from non-blocking updates which don't need to block the\
  \ user interface (like updating a chart).  \nTo prioritize rendering, use one of\
  \ these Hooks:  \n*   [`useTransition`](/reference/react/useTransition) lets you\
  \ mark a state transition as non-blocking and allow other updates to interrupt it.\n\
  *   [`useDeferredValue`](/reference/react/useDeferredValue) lets you defer updating\
  \ a non-critical part of the UI and let other parts update first.  \n* * *\n\n**[^2]:\
  \ [useEffect – React](https://react.dev/reference/react/useEffect)**\n<!-- Document\
  \ Title: useEffect – React -->\n### Wrapping Effects in custom Hooks\n\nEffects\
  \ are an \"escape hatch\": you use them when you need to \"step outside React\"\
  \ and when there is no better built-in solution for your use case. If you find yourself\
  \ often needing to manually write Effects, it's usually a sign that you need to\
  \ extract some custom Hooks for common behaviors your components rely on.\n\nFor\
  \ example, this `useChatRoom` custom Hook \"hides\" the logic of your Effect behind\
  \ a more declarative API:\n\n```\nfunction useChatRoom({ serverUrl, roomId }) {\
  \  useEffect(() => {    const options = {      serverUrl: serverUrl,      roomId:\
  \ roomId    };    const connection = createConnection(options);    connection.connect();\
  \    return () => connection.disconnect();  }, [roomId, serverUrl]);}\n```\n\nThen\
  \ you can use it from any component like this:\n\n```\nfunction ChatRoom({ roomId\
  \ }) {  const [serverUrl, setServerUrl] = useState('https://localhost:1234');  useChatRoom({\
  \    roomId: roomId,    serverUrl: serverUrl  });  // ...\n```\n\nThere are also\
  \ many excellent custom Hooks for every purpose available in the React ecosystem.\n\
  \nLearn more about wrapping Effects in custom Hooks.\n\n#### Examples of wrapping\
  \ Effects in custom Hooks\n\n1. Custom `useChatRoom` Hook 2. Custom `useWindowListener`\
  \ Hook 3. Custom `useIntersectionObserver` Hook\n\n#### \n\nExample 1 of 3:\n\n\
  Custom `useChatRoom` Hook\n\nThis example is identical to one of the earlier examples,\
  \ but the logic is extracted to a custom Hook.\n\nApp.jsuseChatRoom.jschat.js\n\n\
  App.js\n\nResetFork\n\nimport { useState } from 'react';\nimport { useChatRoom }\
  \ from './useChatRoom.js';\n\nfunction ChatRoom({ roomId }) {\nconst \\[serverUrl,\
  \ setServerUrl\\] = useState('https://localhost:1234');\n\nuseChatRoom({\n  roomId:\
  \ roomId,\n  serverUrl: serverUrl\n});\n\nreturn (\n  <\\>\n    <label\\>\n    \
  \  Server URL:{' '}\n      <input\n        value\\={serverUrl}\n        onChange\\\
  ={e \\=> setServerUrl(e.target.value)}\n      />\n    </label\\>\n    <h1\\>Welcome\
  \ to the {roomId} room!</h1\\>\n  </\\>\n);\n}\n\nexport default function App()\
  \ {\nconst \\[roomId, setRoomId\\] = useState('general');\nconst \\[show, setShow\\\
  ] = useState(false);\nreturn (\n  <\\>\n    <label\\>\n      Choose the chat room:{'\
  \ '}\n      <select\n        value\\={roomId}\n        onChange\\={e \\=> setRoomId(e.target.value)}\n\
  \      \\>\n        <option value\\=\"general\"\\>general</option\\>\n        <option\
  \ value\\=\"travel\"\\>travel</option\\>\n        <option value\\=\"music\"\\>music</option\\\
  >\n      </select\\>\n    </label\\>\n    <button onClick\\={() \\=> setShow(!show)}\\\
  >\n      {show ? 'Close chat' : 'Open chat'}\n    </button\\>\n    {show && <hr\
  \ />}\n    {show && <ChatRoom roomId\\={roomId} />}\n  </\\>\n);\n}\n\nShow more\n\
  \nNext Example\n\n* * *\n\n### Controlling a non-React widget\n\nSometimes, you\
  \ want to keep an external system synchronized to some prop or state of your component.\n\
  \nFor example, if you have a third-party map widget or a video player component\
  \ written without React, you can use an Effect to call methods on it that make its\
  \ state match the current state of your React component. This Effect creates an\
  \ instance of a `MapWidget` class defined in `map-widget.js`. When you change the\
  \ `zoomLevel` prop of the `Map` component, the Effect calls the `setZoom()` on the\
  \ class instance to keep it synchronized:\n\nApp.jsMap.jsmap-widget.js\n\nMap.js\n\
  \nResetFork\n\nimport { useRef, useEffect } from 'react';\nimport { MapWidget }\
  \ from './map-widget.js';\n\nexport default function Map({ zoomLevel }) {\nconst\
  \ containerRef = useRef(null);\nconst mapRef = useRef(null);\n\nuseEffect(() \\\
  => {\n  if (mapRef.current === null) {\n    mapRef.current = new MapWidget(containerRef.current);\n\
  \  }\n\n  const map = mapRef.current;\n  map.setZoom(zoomLevel);\n}, \\[zoomLevel\\\
  ]);\n\nreturn (\n  <div\n    style\\={{ width: 200, height: 200 }}\n    ref\\={containerRef}\n\
  \  />\n);\n}\n\nShow more\n\nIn this example, a cleanup function is not needed because\
  \ the `MapWidget` class manages only the DOM node that was passed to it. After the\
  \ `Map` React component is removed from the tree, both the DOM node and the `MapWidget`\
  \ class instance will be automatically garbage-collected by the browser JavaScript\
  \ engine.\n\n* * *\n\n**[^3]: [Components: Image (Legacy) | Next.js](https://nextjs.org/docs/pages/api-reference/components/image-legacy)**\n\
  <!-- Document Title: Components: Image (Legacy) | Next.js -->\nAPI ReferenceComponentsImage\
  \ (Legacy)\n\n# Image (Legacy)\n\nExamples\n\n-   Legacy Image Component\n\nStarting\
  \ with Next.js 13, the `next/image` component was rewritten to improve both the\
  \ performance and developer experience. In order to provide a backwards compatible\
  \ upgrade solution, the old `next/image` was renamed to `next/legacy/image`.\n\n\
  View the **new** `next/image` API Reference\n\n## Comparison\n\nCompared to `next/legacy/image`,\
  \ the new `next/image` component has the following changes:\n\n-   Removes `<span>`\
  \ wrapper around `<img>` in favor of native computed aspect ratio\n-   Adds support\
  \ for canonical `style` prop\n  -   Removes `layout` prop in favor of `style` or\
  \ `className`\n  -   Removes `objectFit` prop in favor of `style` or `className`\n\
  \  -   Removes `objectPosition` prop in favor of `style` or `className`\n-   Removes\
  \ `IntersectionObserver` implementation in favor of native lazy loading\n  -   Removes\
  \ `lazyBoundary` prop since there is no native equivalent\n  -   Removes `lazyRoot`\
  \ prop since there is no native equivalent\n-   Removes `loader` config in favor\
  \ of `loader` prop\n-   Changed `alt` prop from optional to required\n-   Changed\
  \ `onLoadingComplete` callback to receive reference to `<img>` element\n\n## Required\
  \ Props\n\nThe `<Image />` component requires the following properties.\n\n### src\n\
  \nMust be one of the following:\n\n-   A statically imported image file\n-   A path\
  \ string. This can be either an absolute external URL, or an internal path depending\
  \ on the loader prop or loader configuration.\n\nWhen using the default loader,\
  \ also consider the following for source images:\n\n-   When src is an external\
  \ URL, you must also configure remotePatterns\n-   When src is animated or not a\
  \ known format (JPEG, PNG, WebP, AVIF, GIF, TIFF) the image will be served as-is\n\
  -   When src is SVG format, it will be blocked unless `unoptimized` or `dangerouslyAllowSVG`\
  \ is enabled\n\n### width\n\nThe `width` property can represent either the _rendered_\
  \ width or _original_ width in pixels, depending on the `layout` and `sizes` properties.\n\
  \nWhen using `layout=\"intrinsic\"` or `layout=\"fixed\"` the `width` property represents\
  \ the _rendered_ width in pixels, so it will affect how large the image appears.\n\
  \nWhen using `layout=\"responsive\"`, `layout=\"fill\"`, the `width` property represents\
  \ the _original_ width in pixels, so it will only affect the aspect ratio.\n\nThe\
  \ `width` property is required, except for statically imported images, or those\
  \ with `layout=\"fill\"`.\n\n### height\n\nThe `height` property can represent either\
  \ the _rendered_ height or _original_ height in pixels, depending on the `layout`\
  \ and `sizes` properties.\n\nWhen using `layout=\"intrinsic\"` or `layout=\"fixed\"\
  ` the `height` property represents the _rendered_ height in pixels, so it will affect\
  \ how large the image appears.\n\nWhen using `layout=\"responsive\"`, `layout=\"\
  fill\"`, the `height` property represents the _original_ height in pixels, so it\
  \ will only affect the aspect ratio.\n\nThe `height` property is required, except\
  \ for statically imported images, or those with `layout=\"fill\"`.\n\n## Optional\
  \ Props\n\nThe `<Image />` component accepts a number of additional properties beyond\
  \ those which are required. This section describes the most commonly-used properties\
  \ of the Image component. Find details about more rarely-used properties in the\
  \ Advanced Props section.\n\n### layout\n\nThe layout behavior of the image as the\
  \ viewport changes size.\n\n| `layout` | Behavior | `srcSet` | `sizes` | Has wrapper\
  \ and sizer |\n| --- | --- | --- | --- | --- |\n| `intrinsic` (default) | Scale\
  \ _down_ to fit width of container, up to image size | `1x`, `2x` (based on imageSizes)\
  \ | N/A | yes |\n| `fixed` | Sized to `width` and `height` exactly | `1x`, `2x`\
  \ (based on imageSizes) | N/A | yes |\n| `responsive` | Scale to fit width of container\
  \ | `640w`, `750w`, ... `2048w`, `3840w` (based on imageSizes and deviceSizes) |\
  \ `100vw` | yes |\n| `fill` | Grow in both X and Y axes to fill container | `640w`,\
  \ `750w`, ... `2048w`, `3840w` (based on imageSizes and deviceSizes) | `100vw` |\
  \ yes |\n\n-   Demo the `intrinsic` layout (default)\n  -   When `intrinsic`, the\
  \ image will scale the dimensions down for smaller viewports, but maintain the original\
  \ dimensions for larger viewports.\n-   Demo the `fixed` layout\n  -   When `fixed`,\
  \ the image dimensions will not change as the viewport changes (no responsiveness)\
  \ similar to the native `img` element.\n-   Demo the `responsive` layout\n  -  \
  \ When `responsive`, the image will scale the dimensions down for smaller viewports\
  \ and scale up for larger viewports.\n  -   Ensure the parent element uses `display:\
  \ block` in their stylesheet.\n-   Demo the `fill` layout\n  -   When `fill`, the\
  \ image will stretch both width and height to the dimensions of the parent element,\
  \ provided the parent element is relative.\n  -   This is usually paired with the\
  \ `objectFit` property.\n  -   Ensure the parent element has `position: relative`\
  \ in their stylesheet.\n-   Demo background image\n\n### loader\n\nA custom function\
  \ used to resolve URLs. Setting the loader as a prop on the Image component overrides\
  \ the default loader defined in the `images` section of `next.config.js`.\n\nA `loader`\
  \ is a function returning a URL string for the image, given the following parameters:\n\
  \n-   `src`\n-   `width`\n-   `quality`\n\nHere is an example of using a custom\
  \ loader:\n\n```\nimport Image from 'next/legacy/image'\n\nconst myLoader = ({ src,\
  \ width, quality }) => {\nreturn `https://example.com/${src}?w=${width}&q=${quality\
  \ || 75}`\n}\n\nconst MyImage = (props) => {\nreturn (\n  <Image\n    loader={myLoader}\n\
  \    src=\"me.png\"\n    alt=\"Picture of the author\"\n    width={500}\n    height={500}\n\
  \  />\n)\n}\n```\n\n**[^4]: [Removing Effect Dependencies – React](https://react.dev/learn/removing-effect-dependencies)**\n\
  App.jschat.js  \nApp.js  \nReset[Fork](https://codesandbox.io/api/v1/sandboxes/define?undefined&environment=create-react-app\
  \ \"Open in CodeSandbox\")  \nimport { useState, useEffect } from 'react';\nimport\
  \ { createConnection } from './chat.js';  \nconst serverUrl = 'https://localhost:1234';\
  \  \nfunction ChatRoom({ roomId }) {\nconst [message, setMessage] = useState('');\
  \  \n// Temporarily disable the linter to demonstrate the problem\n// eslint-disable-next-line\
  \ react-hooks/exhaustive-deps\nconst options = {\nserverUrl: serverUrl,\nroomId:\
  \ roomId\n};  \nuseEffect(() => {\nconst connection = createConnection(options);\n\
  connection.connect();\nreturn () => connection.disconnect();\n}, [options]);  \n\
  return (\n<>\n<h1>Welcome to the {roomId} room!</h1>\n<input value={message} onChange={e\
  \ => setMessage(e.target.value)} />\n</>\n);\n}  \nexport default function App()\
  \ {\nconst [roomId, setRoomId] = useState('general');\nreturn (\n<>\n<label>\nChoose\
  \ the chat room:{' '}\n<select\nvalue={roomId}\nonChange={e => setRoomId(e.target.value)}\n\
  >\n<option value=\"general\">general</option>\n<option value=\"travel\">travel</option>\n\
  <option value=\"music\">music</option>\n</select>\n</label>\n<hr />\n<ChatRoom roomId={roomId}\
  \ />\n</>\n);\n}  \nShow more  \nIn the sandbox above, the input only updates the\
  \ `message` state variable. From the user's perspective, this should not affect\
  \ the chat connection. However, every time you update the `message`, your component\
  \ re-renders. When your component re-renders, the code inside of it runs again from\
  \ scratch.  \nA new `options` object is created from scratch on every re-render\
  \ of the `ChatRoom` component. React sees that the `options` object is a _different\
  \ object_ from the `options` object created during the last render. This is why\
  \ it re-synchronizes your Effect (which depends on `options`), and the chat re-connects\
  \ as you type.  \n**This problem only affects objects and functions. In JavaScript,\
  \ each newly created object and function is considered distinct from all the others.\
  \ It doesn't matter that the contents inside of them may be the same!**  \n// During\
  \ the first renderconst options1 = { serverUrl: 'https://localhost:1234', roomId:\
  \ 'music' };// During the next renderconst options2 = { serverUrl: 'https://localhost:1234',\
  \ roomId: 'music' };// These are two different objects!console.log(Object.is(options1,\
  \ options2)); // false  \n**Object and function dependencies can make your Effect\
  \ re-synchronize more often than you need.**  \nThis is why, whenever possible,\
  \ you should try to avoid objects and functions as your Effect's dependencies. Instead,\
  \ try moving them outside the component, inside the Effect, or extracting primitive\
  \ values out of them.  \n#### Move static objects and functions outside your component[](#move-static-objects-and-functions-outside-your-component\
  \ \"Link for Move static objects and functions outside your component \")  \nIf\
  \ the object does not depend on any props and state, you can move that object outside\
  \ your component:  \nconst options = {  serverUrl: 'https://localhost:1234',  roomId:\
  \ 'music'};function ChatRoom() {  const [message, setMessage] = useState('');  useEffect(()\
  \ => {    const connection = createConnection(options);    connection.connect();\
  \    return () => connection.disconnect();  }, []); // ✅ All dependencies declared\
  \  // ...  \nThis way, you _prove_ to the linter that it's not reactive. It can't\
  \ change as a result of a re-render, so it doesn't need to be a dependency. Now\
  \ re-rendering `ChatRoom` won't cause your Effect to re-synchronize.  \nThis works\
  \ for functions too:  \nfunction createOptions() {  return {    serverUrl: 'https://localhost:1234',\
  \    roomId: 'music'  };}function ChatRoom() {  const [message, setMessage] = useState('');\
  \  useEffect(() => {    const options = createOptions();    const connection = createConnection(options);\
  \    connection.connect();    return () => connection.disconnect();  }, []); //\
  \ ✅ All dependencies declared  // ...\n\n**[^5]: [Describing the UI – React](https://react.dev/learn/describing-the-ui)**\n\
  ---\ntitle: \"Describing the UI – React\"\ndescription: \"\"\nurl: https://react.dev/learn/describing-the-ui\n\
  lastmod: \"2024-08-22T23:20:28.609Z\"\n---\n[Learn React](/learn)\n# Describing\
  \ the UI[](#undefined \"Link for this heading\")  \nReact is a JavaScript library\
  \ for rendering user interfaces (UI). UI is built from small units like buttons,\
  \ text, and images. React lets you combine them into reusable, nestable _components._\
  \ From web sites to phone apps, everything on the screen can be broken down into\
  \ components. In this chapter, you'll learn to create, customize, and conditionally\
  \ display React components.\n### In this chapter  \n*   [How to write your first\
  \ React component](/learn/your-first-component)\n*   [When and how to create multi-component\
  \ files](/learn/importing-and-exporting-components)\n*   [How to add markup to JavaScript\
  \ with JSX](/learn/writing-markup-with-jsx)\n*   [How to use curly braces with JSX\
  \ to access JavaScript functionality from your components](/learn/javascript-in-jsx-with-curly-braces)\n\
  *   [How to configure components with props](/learn/passing-props-to-a-component)\n\
  *   [How to conditionally render components](/learn/conditional-rendering)\n*  \
  \ [How to render multiple components at a time](/learn/rendering-lists)\n*   [How\
  \ to avoid confusing bugs by keeping components pure](/learn/keeping-components-pure)\n\
  *   [Why understanding your UI as trees is useful](/learn/understanding-your-ui-as-a-tree)\n\
  ## Your first component[](#your-first-component \"Link for Your first component\
  \ \")  \nReact applications are built from isolated pieces of UI called _components_.\
  \ A React component is a JavaScript function that you can sprinkle with markup.\
  \ Components can be as small as a button, or as large as an entire page. Here is\
  \ a `Gallery` component rendering three `Profile` components:  \nApp.js  \nApp.js\
  \  \nReset[Fork](https://codesandbox.io/api/v1/sandboxes/define?undefined&environment=create-react-app\
  \ \"Open in CodeSandbox\")  \nfunction Profile() {\nreturn (\n<img\nsrc=\"https://i.imgur.com/MK3eW3As.jpg\"\
  \nalt=\"Katherine Johnson\"\n/>\n);\n}  \nexport default function Gallery() {\n\
  return (\n<section>\n<h1>Amazing scientists</h1>\n<Profile />\n<Profile />\n<Profile\
  \ />\n</section>\n);\n}  \nShow more\n\n**[^6]: [AI SDK](https://sdk.vercel.ai)**\n\
  # AI SDK Overview\n\nThe AI SDK is a TypeScript toolkit designed to simplify the\
  \ process of building AI-powered applications with various frameworks like React,\
  \ Next.js, Vue, Svelte, and Node.js. It provides a unified API for working with\
  \ different AI models, making it easier to integrate AI capabilities into your applications.\n\
  \nKey components of the AI SDK include:\n\n1. **AI SDK Core**: This provides a standardized\
  \ way to generate text, structured objects, and tool calls with Large Language Models\
  \ (LLMs).\n2. **AI SDK UI**: This offers framework-agnostic hooks for building chat\
  \ and generative user interfaces.\n\n---\n\n## API Design\n\nThe AI SDK provides\
  \ several core functions and integrations:\n\n- `streamText`: This function is part\
  \ of the AI SDK Core and is used for streaming text from LLMs. It's ideal for interactive\
  \ use cases like chatbots or real-time applications where immediate responses are\
  \ expected.\n- `generateText`: This function is also part of the AI SDK Core and\
  \ is used for generating text for a given prompt and model. It's suitable for non-interactive\
  \ use cases or when you need to write text for tasks like drafting emails or summarizing\
  \ web pages.\n- `@ai-sdk/openai`: This is a package that provides integration with\
  \ OpenAI's models. It allows you to use OpenAI's models with the standardized AI\
  \ SDK interface.\n\n### Core Functions\n\n#### 1. `generateText`\n\n- **Purpose**:\
  \ Generates text for a given prompt and model.\n- **Use case**: Non-interactive\
  \ text generation, like drafting emails or summarizing content.\n\n**Signature**:\n\
  ```typescript\nfunction generateText(options: {\nmodel: AIModel;\nprompt: string;\n\
  system?: string;\n}): Promise<{ text: string; finishReason: string; usage: Usage\
  \ }>\n```\n\n#### 2. `streamText`\n\n- **Purpose**: Streams text from a given prompt\
  \ and model.\n- **Use case**: Interactive applications like chatbots or real-time\
  \ content generation.\n\n**Signature**:\n```typescript\nfunction streamText(options:\
  \ {\nmodel: AIModel;\nprompt: string;\nsystem?: string;\nonChunk?: (chunk: Chunk)\
  \ => void;\nonFinish?: (result: StreamResult) => void;\n}): StreamResult\n```\n\n\
  ### OpenAI Integration\n\nThe `@ai-sdk/openai` package provides integration with\
  \ OpenAI models:\n\n```typescript\nimport { openai } from '@ai-sdk/openai'\n\nconst\
  \ model = openai('gpt-4o')\n```\n\n---\n\n## Examples\n\n### 1. Basic Text Generation\n\
  \n```typescript\nimport { generateText } from 'ai'\nimport { openai } from '@ai-sdk/openai'\n\
  \nasync function generateRecipe() {\nconst { text } = await generateText({\n  model:\
  \ openai('gpt-4o'),\n  prompt: 'Write a recipe for a vegetarian lasagna.',\n})\n\
  \nconsole.log(text)\n}\n\ngenerateRecipe()\n```\n\n### 2. Interactive Chat Application\n\
  \n```typescript\nimport { streamText } from 'ai'\nimport { openai } from '@ai-sdk/openai'\n\
  \nfunction chatBot() {\nconst result = streamText({\n  model: openai('gpt-4o'),\n\
  \  prompt: 'You are a helpful assistant. User: How can I improve my productivity?',\n\
  \  onChunk: ({ chunk }) => {\n    if (chunk.type === 'text-delta') {\n      process.stdout.write(chunk.text)\n\
  \    }\n  },\n})\n\nresult.text.then(fullText => {\n  console.log('\\n\\nFull response:',\
  \ fullText)\n})\n}\n\nchatBot()\n```\n\n### 3. Summarization with System Prompt\n\
  \n```typescript\nimport { generateText } from 'ai'\nimport { openai } from '@ai-sdk/openai'\n\
  \nasync function summarizeArticle(article: string) {\nconst { text } = await generateText({\n\
  \  model: openai('gpt-4o'),\n  system: 'You are a professional summarizer. Provide\
  \ concise summaries.',\n  prompt: `Summarize the following article in 3 sentences:\
  \ ${article}`,\n})\n\nconsole.log('Summary:', text)\n}\n\nconst article = `\nArtificial\
  \ Intelligence (AI) has made significant strides in recent years, \ntransforming\
  \ various industries and aspects of daily life. From healthcare \nto finance, AI-powered\
  \ solutions are enhancing efficiency, accuracy, and \ndecision-making processes.\
  \ However, the rapid advancement of AI also raises \nethical concerns and questions\
  \ about its impact on employment and privacy.\n`\n\nsummarizeArticle(article)\n\
  ```\n\nThese examples demonstrate the versatility and ease of use of the AI SDK,\
  \ showcasing text generation, interactive streaming, and summarization tasks using\
  \ OpenAI models.\n\n---\n\n## Language Model Middleware\n\nLanguage model middleware\
  \ is an experimental feature in the AI SDK that allows you to enhance the behavior\
  \ of language models by intercepting and modifying the calls to the language model.\
  \ It can be used to add features like guardrails, Retrieval Augmented Generation\
  \ (RAG), caching, and logging in a language model agnostic way.\n\n### Using Language\
  \ Model Middleware\n\nYou can use language model middleware with the `wrapLanguageModel`\
  \ function. Here's an example:\n\n```typescript\nimport { experimental_wrapLanguageModel\
  \ as wrapLanguageModel } from 'ai';\nimport { openai } from '@ai-sdk/openai';\n\n\
  const wrappedLanguageModel = wrapLanguageModel({\nmodel: openai('gpt-4o'),\nmiddleware:\
  \ yourLanguageModelMiddleware,\n});\n\n// Use the wrapped model with streamText\n\
  const result = streamText({\nmodel: wrappedLanguageModel,\nprompt: 'What cities\
  \ are in the United States?',\n});\n```\n\n### Implementing Language Model Middleware\n\
  \nHere's an example of a logging middleware that logs the parameters and generated\
  \ text of a language model call:\n\n```typescript\nimport type {\nExperimental_LanguageModelV1Middleware\
  \ as LanguageModelV1Middleware,\nLanguageModelV1StreamPart,\n} from 'ai';\n\nexport\
  \ const loggingMiddleware: LanguageModelV1Middleware = {\nwrapGenerate: async ({\
  \ doGenerate, params }) => {\n  console.log('doGenerate called');\n  console.log(`params:\
  \ ${JSON.stringify(params, null, 2)}`);\n\n  const result = await doGenerate();\n\
  \n  console.log('doGenerate finished');\n  console.log(`generated text: ${result.text}`);\n\
  \n  return result;\n},\n\nwrapStream: async ({ doStream, params }) => {\n  console.log('doStream\
  \ called');\n  console.log(`params: ${JSON.stringify(params, null, 2)}`);\n\n  const\
  \ { stream, ...rest } = await doStream();\n\n  let generatedText = '';\n\n  const\
  \ transformStream = new TransformStream<\n    LanguageModelV1StreamPart,\n    LanguageModelV1StreamPart\n\
  \  >({\n    transform(chunk, controller) {\n      if (chunk.type === 'text-delta')\
  \ {\n        generatedText += chunk.textDelta;\n      }\n\n      controller.enqueue(chunk);\n\
