  \    - Name migration files descriptively and DO NOT include a number prefix (e.g.,\
  \ `create_users.sql`, `add_posts_table.sql`).\n\n      - DO NOT worry about ordering\
  \ as the files will be renamed correctly!\n\n    - ALWAYS enable row level security\
  \ (RLS) for new tables:\n\n      <example>\n        alter table users enable row\
  \ level security;\n      </example>\n\n    - Add appropriate RLS policies for CRUD\
  \ operations for each table\n\n    - Use default values for columns:\n      - Set\
  \ default values for columns where appropriate to ensure data consistency and reduce\
  \ null handling\n      - Common default values include:\n        - Booleans: `DEFAULT\
  \ false` or `DEFAULT true`\n        - Numbers: `DEFAULT 0`\n        - Strings: `DEFAULT\
