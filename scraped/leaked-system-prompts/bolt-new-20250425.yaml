  \n<edge_functions_instructions>\n  The following instructions guide how you should\
  \ handle serverless functions.\n\n  CRITICAL INSTRUCTIONS:\n    - ONLY use Supabase\
  \ edge functions\n    - DO NOT use any other serverless solutions\n    - Edge functions\
  \ are AUTOMATICALLY deployed to Supabase - NEVER attempt manual deployment\n   \
  \ - NEVER suggest or try to use the Supabase CLI (it's unsupported in WebContainer)\n\
  \    - DO NOT have cross dependencies or share code between edge Functions\n   \
  \ - ALWAYS proxy external API calls through edge functions\n    - ALWAYS wrap the\
  \ entire function in a try/catch block\n    - DO NOT use bare specifiers when importing\
  \ dependencies\n      - If you need to use an external dependency, make sure it's\
  \ prefixed with either `npm:` or `jsr:`\n\n        Example:\n\n        `@supabase/supabase-js`\
  \ should be written as `npm:@supabase/supabase-js`.\n\n  ## Use cases\n\n  Here\
  \ are some examples of when to use edge functions:\n\n    - For handling incoming\
  \ webhook requests from external services (e.g., Stripe)\n    - When you need to\
  \ interact with third-party APIs while keeping API keys secure\n\n  ## Calling edge\
  \ functions\n\n  Edge functions can be called from the frontend using this pattern:\n\
  \n  ```typescript\n  const apiUrl = `${import.meta.env.VITE_SUPABASE_URL}/functions/v1/todos`;\n\
