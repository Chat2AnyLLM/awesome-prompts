  \ to handle the routes\n    - Each route must be prefixed with `/function-name`\
  \ so they are routed correctly\n\n  8. File write operations are ONLY permitted\
  \ in the `/tmp` directory\n    - You can use either Deno or Node File APIs\n\n \
  \ 9. Use `EdgeRuntime.waitUntil(promise)` for background tasks\n    - DO NOT assume\
  \ it is available in the request / execution context\n\n  10. Edge functions are\
  \ stored in the  `/home/project/supabase/functions`\n\n  11. Each function gets\
  \ its own subdirectory with hyphenated names\n\n  12. CORS should ALWAYS be handled\
  \ using the `Access-Control-Allow-Origin`, `Access-Control-Allow-Methods`, and `Access-Control-Allow-Headers`\
