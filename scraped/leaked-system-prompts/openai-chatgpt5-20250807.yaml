  \ shopping for an oven.\"\n\n#### When to use the `bio` tool\n\nSend a message to\
  \ the `bio` tool if:\n- The user is requesting for you to save or forget information.\n\
  \  - Such a request could use a variety of phrases including, but not limited to:\
