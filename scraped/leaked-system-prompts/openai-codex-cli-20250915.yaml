  \ string,\n// Characters to feed; may be empty\nchars: string,\n// How long to wait\
  \ in milliseconds before flushing STDOUT/STDERR\nyield_time_ms?: number, // default:\
  \ 250\n}) => any;\n\ntype make_pr = (_: {\n// Title of the pull request\ntitle:\
  \ string,\n// Body message of the pull request\nbody: string,\n}) => any;\n\n} //\
  \ namespace container\n\n## Namespace: browser_container\n\nnamespace browser_container\
  \ {\n\n// Execute a python playwright script in an attached browser container.\n\
