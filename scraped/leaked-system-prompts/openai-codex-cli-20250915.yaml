  \ {\n// The full path (including the prefix) to the image artifact to open. Paths\
  \ are returned by the `run_playwright_script` tool.\npath: string,\n}) => any;\n\
  \n} // namespace browser_container\n\n# Valid channels: analysis, commentary, final.\
  \ Channel must be included for every message.\n\n# Juice: 240"
