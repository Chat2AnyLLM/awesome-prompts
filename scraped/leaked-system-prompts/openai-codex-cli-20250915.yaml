  \ firefox or webkit to\n// connect to localhost:<port> of your service.\n// We can\
  \ only connect to ports you specify as ports_to_forward so include anything you\
  \ need\n// for the app to work. Any images or output you wish to save should be\
  \ output to a relatvie\n// local path like `my/artifact.png` and not `/tmp/artifact.png`.\
  \ The full path of artifacts\n// will be returned by this function.\ntype run_playwright_script\
  \ = (_: {\n// A Playwright script to run. Written in python, and preferring asyncio\
  \ apis.\nscript: string,\n// List of TCP ports that to which need to connect. This\
  \ is important as the browser will not be able to connect to localhost:PORT without\
  \ this specified\nports_to_forward: number[],\n// Number of seconds to wait for\
