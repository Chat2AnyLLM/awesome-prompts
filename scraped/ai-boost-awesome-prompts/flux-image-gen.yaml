slug: flux-image-gen
title: Flux Image Gen
prompt: "Flux Image Generation Prompt Guide & Template\nSource: Black Forest Labs\
  \ official guide + community best practices (2025)\n------------------------------------------------------------------\n\
  \nCORE TEMPLATE:\n\n{camera} at {aperture}: {subject + action}, {environment & atmosphere},\n\
  {lighting}, {style reference}.\n\nEXAMPLE:\n\nHasselblad X2D 100C with 90mm lens\
  \ at f/4: a woman emerges from morning mist\non a mountain ridge, crystalline frost\
  \ formations catching early light,\ngolden alpenglow with deep teal shadows, inspired\
  \ by Ansel Adams,\ncinematic depth of field, wide aspect ratio.\n\n------------------------------------------------------------------\n\
  WORD ORDER — MOST IMPORTANT FIRST:\n\nFlux weights earlier tokens more heavily.\
  \ Structure as:\n1. Main subject + action\n2. Critical style element\n3. Environment/setting\n\
  4. Lighting\n5. Secondary details\n\n------------------------------------------------------------------\n\
  TECHNICAL LAYER (include in every prompt):\n\nCamera body:    Hasselblad, Leica,\
  \ Sony A7R4, Nikon Z9, Canon R5, Pentax 645Z\nLens focal:     35mm (wide/environmental),\
  \ 50mm (natural), 85mm (portrait),\n                135mm (compressed), 200mm (telephoto\
  \ isolation)\nAperture:       f/1.2–f/2 (shallow blur), f/4 (balanced), f/8–f/11\
  \ (sharp),\n                f/16 (landscape, all in focus)\nLighting:       golden\
  \ hour, blue hour, overcast diffuse, Rembrandt,\n                backlighting, practical\
  \ neon, strobe, bioluminescent\n\n------------------------------------------------------------------\n\
  STYLE REFERENCES:\n\nPhotographers:  Ansel Adams (landscape), Annie Leibovitz (portrait),\n\
  \                Gregory Crewdson (cinematic), Hiroshi Sugimoto (minimalist),\n\
  \                Steve McCurry (documentary), Peter Lik (nature)\nArt styles:  \
  \   art deco, bauhaus, ukiyo-e, brutalist, cyberpunk,\n                solarpunk,\
  \ dark academia, cottagecore\nFilm palettes:  \"Blade Runner 2049\" (teal-orange),\
  \ \"The Grand Budapest Hotel\"\n                (pastel), \"Mad Max: Fury Road\"\
  \ (desaturated orange),\n                \"Moonlight\" (blue-gold)\n\n------------------------------------------------------------------\n\
  PROMPT LENGTH GUIDE:\n\n10–30 words:   Quick iteration, exploring concepts\n30–80\
  \ words:   Standard — best for most projects\n80–120 words:  Detailed scenes with\
  \ many specific elements\n120+ words:    Complex compositions; diminishing returns\
  \ past ~150 words\n\n------------------------------------------------------------------\n\
  LANGUAGE RULES:\n\n✓ Use action verbs:     \"emerges through mist\" not \"mountain\
  \ with mist\"\n✓ Use flowing prose:    avoid comma-separated keyword lists\n✓ Be\
  \ specific:          \"Hasselblad at f/4\" not \"professional camera\"\n✓ Text in\
  \ images:       use quotation marks: \"the text you want\"\n✗ Avoid negative terms:\
  \ describe what you want, not what to exclude\n✗ Avoid \"high quality\", \"best\"\
  , \"ultra HD\" — they rarely help\n\n------------------------------------------------------------------\n\
  ATMOSPHERE MODIFIERS:\n\nWeather:     \"rain-slicked streets\", \"swirling snowstorm\"\
  , \"heat haze shimmer\",\n             \"sea fog rolling in\", \"lightning on horizon\"\
  \nTime:        \"30 minutes before sunrise\", \"golden hour last light\",\n    \
  \         \"blue hour just after sunset\", \"3am city quiet\"\nMood:        \"melancholic\
  \ stillness\", \"charged anticipation\",\n             \"serene isolation\", \"\
  electric tension\"\n\n------------------------------------------------------------------\n\
  QUICK REFERENCE — COPY AND FILL:\n\n[Camera model] with [focal length]mm lens at\
  \ [aperture]:\n[subject] [action verb], [environmental detail],\n[atmospheric condition],\
  \ [lighting description],\ninspired by [photographer/artist], [mood adjective] tone.\n\
  \n------------------------------------------------------------------\nFLUX vs DALL-E\
  \ vs MIDJOURNEY:\n\nFlux:        Best for photorealism, follows long complex prompts\
  \ precisely,\n             camera/lens terminology works especially well\nDALL-E\
  \ 3:    Best for illustrated/stylized, auto-optimizes your prompt,\n           \
  \  literal and precise interpretation of unusual requests\nMidjourney:  Best for\
  \ stylized artistic output, use --ar --s --chaos params,\n             shorter prompts\
  \ often outperform long ones"
