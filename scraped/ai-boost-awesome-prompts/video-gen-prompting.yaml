slug: video-gen-prompting
title: Video Gen Prompting
prompt: "AI Video Generation Prompt Guide & Templates\nSources: OpenAI Sora 2 Cookbook\
  \ (2025), Runway Gen-3 official docs, Kling 2.6 community guide,\n         Medium/@creativeaininja\
  \ model-specific strategies (2025-2026)\n------------------------------------------------------------------\n\
  \nCORE PHILOSOPHY:\n\nTreat a video prompt like a cinematographer's brief to a director.\n\
  Specify: WHAT is happening, HOW the camera moves, WHAT the light does, and WHEN\
  \ things change.\nVagueness yields randomness. Specificity yields control.\n\nEach\
  \ model has a distinct \"personality\":\n  Runway Gen 4.5  → kinetic sculptor; obsessed\
  \ with physics and camera movement\n  Kling 2.6       → audio-visual choreographer;\
  \ generates synced sound + video\n  Veo 3 / 3.1     → rendering engine; loves structured\
  \ data and reference images\n  Sora 2          → physics simulator; models cause,\
  \ effect, and inertia\n\n------------------------------------------------------------------\n\
  UNIVERSAL PROMPT STRUCTURE (works across all models):\n\n[STYLE INTENT] — cinematic\
  \ short film | documentary | commercial | music video\n[SHOT TYPE + FRAMING] — wide\
  \ establishing shot | medium close-up | aerial\n[CAMERA MOVEMENT] — slow dolly-in\
  \ | handheld ENG | crane boom up | static\n[SUBJECT + ACTION] — described in beats/counts,\
  \ not vague adjectives\n[ENVIRONMENT] — foreground, midground, background, weather\n\
  [LIGHTING] — source, direction, quality, color palette anchors\n[DURATION HINT]\
  \ — 4s / 8s / 12s (models follow shorter clips more reliably)\n\nRule: One camera\
  \ move + one subject action per shot.\n\n------------------------------------------------------------------\n\
  SHOT TYPE VOCABULARY:\n\nWide establishing shot, eye level\nAerial wide shot, slight\
  \ downward angle\nMedium shot, straight on\nMedium close-up, slight angle from behind\n\
  Close-up (face / object), tight framing\nExtreme close-up, macro detail\nTwo-shot,\
  \ over-the-shoulder\n\n------------------------------------------------------------------\n\
  CAMERA MOVEMENT VOCABULARY:\n\nHorizontal:  pan left / pan right | truck left /\
  \ truck right\nVertical:    tilt up / tilt down | boom up / boom down | crane shot\n\
  Depth:       dolly in / dolly out | zoom in / zoom out\nComplex:     tracking shot\
  \ | whip pan | handheld ENG | gimbal smooth\nModifiers:   slow | fast | steady |\
  \ shaky | floating | rapid\n\n------------------------------------------------------------------\n\
  LIGHTING VOCABULARY:\n\nQuality:    soft diffuse | hard directional | volumetric\
  \ | HDR specular\nSource:     practical window light | neon sign | overhead fluorescent\
  \ |\n            candle | morning sun | golden hour | blue hour\nDirection:  45°\
  \ key right | rim from behind | flat fill | negative fill\nPalette:    \"warm amber\
  \ + cream + walnut\" | \"teal + coral + concrete grey\" |\n            \"cool daylight\
  \ 5600K with tungsten practicals\"\n\n------------------------------------------------------------------\n\
  STRONG vs WEAK — COMPARISON TABLE:\n\nWeak                          Strong\n----\
  \                          ------\n\"Beautiful street at night\"   \"Wet asphalt,\
  \ zebra crosswalk, neon reflections\n                               pooling in puddles\"\
  \n\"Person moves quickly\"        \"Cyclist pedals three times, brakes hard at\n\
  \                               crosswalk, front wheel skids\"\n\"Cinematic look\"\
  \              \"Anamorphic 2.0x lens, shallow DOF, volumetric\n               \
  \                light shafts, grain at ISO 800\"\n\"A car crash\"             \
  \    \"Heavy sedan at high velocity impacts concrete\n                         \
  \      barrier. Hood crumples with resistance; glass\n                         \
  \      shatters with momentum; chassis recoils.\"\n\"Brightly lit room\"       \
  \    \"Soft window light with warm lamp fill, cool rim\n                       \
  \        from hallway; palette: amber, cream, walnut brown\"\n\n------------------------------------------------------------------\n\
  SORA 2 — SPECIFIC TECHNIQUES:\n\nBest for: physics-heavy action, fluid dynamics,\
  \ complex object interactions.\n\nCausal chain technique — explain WHY things happen:\n\
  \  \"Glass tipped by elbow. Liquid breaches rim, impacts table, shatters from\n\
  \   impact force, milk spreads with surface tension holding droplets on wood grain.\"\
  \n\nScaffolded multi-shot template:\n  [Scene headline]\n  Shot 1 (0-5s): [Angle]\
  \ + [Action]\n  Shot 2 (5-10s): [New angle] + [Action continuation]\n  Shot 3 (10-15s):\
  \ [Close-up] + [Resolution]\n  Physics Notes: [Global rules — e.g. \"low gravity\"\
  , \"wet surfaces\"]\n\nAPI-only parameters (must be set outside prompt text):\n\
  \  model: sora-2 or sora-2-pro\n  size: 1280x720 | 720x1280 | 1920x1080 (pro only)\n\
  \  seconds: 4 | 8 | 12 | 16 | 20\n\nCharacters API: reuse character references across\
  \ shots (max 2 per generation).\n\nPhysics glitch fixes:\n  Object morphing    \
  \  → \"remains solid and rigid throughout\"\n  Weightless motion    → include weight\
  \ descriptors: heavy, dense, solid\n  Unrealistic impact   → specify: \"baseball\
  \ hits window creating spiderweb crack\"\n  Floating objects     → negative: \"\
  no clipping, no defiance of gravity\"\n\n------------------------------------------------------------------\n\
  RUNWAY GEN 4.5 — SPECIFIC TECHNIQUES:\n\nBest for: commercials, VFX, product shots,\
  \ physics-heavy scenes.\n\nForce-reaction syntax:\n  Not: \"A car drives fast\"\n\
  \  Use: \"Vehicle moving at high velocity, tires spray water as chassis leans\n\
  \        into curve, inertia carries weight, gravel pings undercarriage.\"\n\nCamera\
  \ control tokens (use exactly):\n  Camera pan left | Camera pan right\n  Camera\
  \ tilt up | Camera tilt down\n  Truck left | Truck right\n  Zoom in | Zoom out\n\
  \  Dolly in | Dolly out\n  Boom up | Boom down\n\nMotion Brush workflow (in-tool):\n\
  \  1. Paint foreground with motion vector left (-3)\n  2. Paint background with\
  \ vector right (+1)\n  3. Reinforce in text: \"Camera trucking right, foreground\
  \ moves past quickly\"\n\nCommon fixes:\n  Morphing objects → \"remains solid and\
  \ rigid throughout\"\n  Weightless motion → add weight terms: heavy, dense, hollow,\
  \ solid\n  Jerky camera → \"smooth dolly in\" or \"steady pan right\"\n  Motion\
  \ blur artifacts → lower brush strength, add \"crisp motion\"\n\n------------------------------------------------------------------\n\
  KLING 2.6 — SPECIFIC TECHNIQUES:\n\nBest for: music videos, dialogue scenes, narrative\
  \ with spoken lines.\n\nTimeline script template:\n  Cinematic [aspect ratio], [visual\
  \ style]\n\n  Beat 0-4s:  [Camera angle] + [Scene description]\n  Beat 4-8s:  [Camera\
  \ change] + [Action]\n  Beat 8-10s: [Final shot or reaction]\n\n  Audio:\n    0-4s:\
  \ [Ambient sound]\n    4.5s: SFX: [Sound effect synchronized to action]\n    8s:\
  \   Dialogue ([Character name], [Tone]): \"Line here\"\n\nLip sync rules:\n  Keep\
  \ dialogue under 5 seconds per line\n  Format: \"Beat 5-8s: Close-up. Detective\
  \ (Male, Weary): 'I don't believe\n           in coincidences.'\"\n  Tone descriptors:\
  \ (whispering) | (shouting) | (breathy) | (resigned)\n\nNegative prompts (use the\
  \ negatives field, not in main prompt):\n  Audio:   \"no background music, no mumble,\
  \ no overlapping speech, no distortion\"\n  Visual:  \"no text overlays, no blurring,\
  \ no morphing, no extra limbs\"\n\nCharacter consistency: use Elements feature —\
  \ upload reference image, tag as\nElement, reference by name in all future prompts.\n\
  \n------------------------------------------------------------------\nVEO 3 / 3.1\
  \ — SPECIFIC TECHNIQUES:\n\nBest for: brand-consistent series, personalized campaigns,\
  \ multi-shot automation.\n\nStructured prompt (JSON-style):\n  Project: [Cinematic\
  \ Commercial / Documentary / etc.]\n  Aspect ratio: 16:9\n  Cinematography:\n  \
  \  Camera gear: Alexa Mini LF\n    Lens: Anamorphic 35mm\n    Shot type: Medium\
  \ close-up\n    Movement: Slow dolly in\n    Lighting key: Softbox 45° right\n \
  \   Lighting fill: Negative fill left\n    Contrast ratio: High contrast 8:1\n \
  \ Subject:\n    Description: [person, age, attire]\n    Action: [beat-by-beat action\
  \ description]\n    Expression: [start state → end state]\n  Audio:\n    Dialogue:\
  \ [labeled by character name]\n    Ambience: [room tone, environment]\n\nInterpolation\
  \ feature: provide start frame + end frame as image uploads;\nVeo fills the motion\
  \ between them — best for seamless scene transitions.\n\nMasked editing: regenerate\
  \ only a specific region without re-creating entire scene.\n\nIngredients workflow:\
  \ upload Midjourney keyframes as reference images for\nvisual consistency across\
  \ a series.\n\n------------------------------------------------------------------\n\
  SORA 2 — FULL REUSABLE PROMPT TEMPLATE:\n\n[Plain language scene description: characters,\
  \ costumes, scenery, weather]\n\nCinematography:\n  Camera shot: [framing + angle]\n\
  \  Mood: [overall tonal intent]\n\nActions:\n  - [Beat 1: specific action with count\
  \ or timing]\n  - [Beat 2: distinct next beat]\n  - [Beat 3: resolution or reaction]\n\
  \nDialogue (if any):\n  [Character (Tone)]: \"Natural, concise line\"\n\nBackground\
  \ Sound:\n  [Ambient sound cue — rhythm guide, not full soundtrack]\n\n------------------------------------------------------------------\n\
  ULTRA-DETAILED PRODUCTION TEMPLATE (for maximum control):\n\nFormat & Look:    [emulated\
  \ film stock: Kodak Vision3, Fuji Eterna | grain level |\n                   shutter\
  \ angle: 180° for standard, 45° for stutter effect]\nLens & Filter:    [focal length\
  \ + anamorphic ratio + filter: diffusion, polarizer]\nColor Grade:      [highlights:\
  \ warm amber | mids: neutral | shadows: deep teal |\n                   overall\
  \ contrast: high / low]\nLighting:         [key source + angle | bounce | negative\
  \ fill | practicals |\n                   atmospheric: haze, smoke, dust motes]\n\
  Location:         [foreground element | midground action | background depth]\nWardrobe/Props:\
  \   [specific textures, colors, materials]\nSound:            [diegetic: footsteps,\
  \ door, engine | added: score, SFX]\nShot breakdown:\n  Shot 1 [duration]: [purpose\
  \ — establish location] — [description]\n  Shot 2 [duration]: [purpose — introduce\
  \ character] — [description]\n  Shot 3 [duration]: [purpose — reveal/payoff] — [description]\n\
  \n------------------------------------------------------------------\nHYBRID WORKFLOW\
  \ (professional pipeline):\n\nStep 1 — Keyframe generation:    Midjourney (full\
  \ art direction control)\nStep 2 — Motion synthesis:       Veo 3.1 interpolation\
  \ (start + end frame upload)\nStep 3 — Dialogue / audio sync:  Kling 2.6 with timeline\
  \ script\nStep 4 — Upscaling:              Topaz Video AI → 4K output\n\nAudio-first\
  \ music video workflow:\n  1. Generate audio in Suno or ElevenLabs\n  2. Export\
  \ beat timestamps\n  3. Map timeline script beats to audio timestamps in Kling\n\
  \  4. Enable lip-sync mode with character reference\n\n------------------------------------------------------------------\n\
  MODEL SELECTION GUIDE:\n\nModel           Best use case\n-----           -------------\n\
  Runway Gen 4.5  Commercials, VFX, physics-heavy action, product shots\nKling 2.6\
  \       Music videos, dialogue scenes, narrative with spoken lines\nVeo 3.1    \
  \     Brand-consistent series, automation, reference-image anchoring\nSora 2   \
  \       Physics simulation, fluid dynamics, complex interactions\n\n------------------------------------------------------------------\n\
  COMMON FAILURE PATTERNS + FIXES:\n\nProblem                         Fix\n-------\
  \                         ---\nInconsistent style across shots Create master style\
  \ reference, use as ingredient\n                                 or Element in every\
  \ generation\nQuality degrades on iterations  Don't iterate in-tool — regenerate\
  \ from upscaled still\nRunway: motion blur artifacts   Lower brush strength; add\
  \ \"crisp motion\"\nKling: dialogue bleed           Use explicit [Character Name]\
  \ brackets per line\nVeo: reference image ignored    Mention the reference explicitly\
  \ in prose too\nSora: physics glitches          Break into simpler sub-scenes; add\
  \ causal chain\nAll models: morphing objects     \"remains solid and rigid throughout\"\
  \nAll models: weightless motion    Use weight-specific nouns: heavy, dense, hollow\n\
  \nDuration note: all models follow shorter clips more reliably.\nFor 8s of action,\
  \ consider generating two 4s clips and stitching."
