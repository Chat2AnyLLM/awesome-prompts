prompt: "---\nname: adhd\ndescription: Parallel divergent ideation for coding agents.\
  \ Spawns N isolated branches under different cognitive frames (regulator, biology,\
  \ speedrunner, 10-year-old, $0 budget), scores, clusters, prunes traps, and deepens\
  \ top survivors. Use on /adhd, \"ADHD mode\", brainstorm/ideate intents, or open-ended\
  \ design, architecture, naming, API/SDK surface, and fuzzy-debugging decisions.\
  \ Skip for syntax, lookups, bugs with known root cause, or closed phrasing (\"quick\"\
  , \"standard\", \"canonical\", \"textbook\"). Full pre-flight gate is in the skill\
  \ body.\nlicense: MIT\n---\n\n# ADHD\n\nStop picking the textbook answer. The first\
  \ three answers the model would\ngive are the answers a senior engineer would give\
  \ in thirty seconds.\nCorrect. Forgettable. The interesting answers live past number\
  \ three, in\nthe awkward middle nobody walks into. This skill makes the model walk\n\
  there.\n\n## Pre-flight (run before Phase 1)\n\nThis skill is expensive. About 10\
  \ Agent calls, 30 to 90 seconds wall clock,\n5 to 10x a single answer. Do not pay\
  \ that cost when a direct answer is\nbetter. Run this gate before Phase 1.\n\n**Step\
  \ 1. Explicit invocation check.**\n\nIf the user typed `/adhd` or explicitly asked\
  \ for ADHD mode, \"use the\nadhd skill\", or \"run ADHD on this\", **SKIP the rest\
  \ of this section and go\nstraight to Phase 1**. The user opted in. Do not second-guess.\n\
  \n**Step 2. Self-judge (only if Step 1 did not match).**\n\nAsk yourself three questions.\
  \ If the answer to any is no, ABORT.\n\n1. **Open-ended?** Would a senior engineer\
  \ give multiple viable answers\n   here, or is there one canonical answer? If canonical,\
  \ abort.\n2. **High-stakes?** Is the cost of the obvious answer being wrong actually\n\
  \   high? Architecture decisions, public API surfaces, naming a real\n   product,\
  \ fuzzy bugs with no known root cause, schema design = yes.\n   Side project at\
  \ 11pm = no.\n3. **Open phrasing?** Did the user avoid words like \"quick\", \"\
  standard\",\n   \"canonical\", \"textbook\", \"just\", \"one-line\"? If they used\
  \ any of those,\n   they want the direct answer. Abort.\n\nIf all three checks pass,\
  \ proceed to Phase 1.\n\nIf any fails, ABORT and answer the question directly. Optionally\
  \ append\none sentence: *\"If you want a wider exploration under parallel cognitive\n\
  frames with explicit trap detection, run `/adhd <your problem>`.*\"\n\n## When to\
  \ trigger (summary)\n\nStrong signals to invoke:\n\n- explicit `/adhd <problem>`\
  \ or \"use ADHD mode\" (unconditional)\n- *\"give me a few ways to…\"*, *\"brainstorm…\"\
  *, *\"what are some approaches\"*\n- *\"the obvious answer feels wrong\"*, *\"I'm\
  \ stuck on X\"*\n- architecture or design decision on something that ships\n- fuzzy\
  \ bug, no known root cause, user wants hypothesis classes\n- naming for a public\
  \ product, API, SDK surface\n\nStrong signals to NOT invoke:\n\n- factual lookup,\
  \ syntax help, \"what is X\"\n- bug fix with a known root cause\n- \"quick\", \"\
  standard\", \"canonical\", \"textbook\", \"just show me\"\n- inner-loop / per-keystroke\
  \ work\n- the answer is one search query away\n\n## The loop\n\nTwo strict phases.\
  \ Mixing them kills idea quality, because the critic\nstrangles the generator.\n\
  \n### Phase 1 — Diverge (no critic)\n\nFor the problem P:\n\n1. Pick 5 cognitive\
  \ frames from the table below. Bias toward engineering\n   tags when the problem\
  \ is code-shaped. Always include at least one wild\n   frame to keep range.\n\n\
  2. Spawn 5 **parallel** Agent/Task tool calls. One per frame. Each Agent\n   gets\
  \ only:\n   - the problem P\n   - any context the user provided\n   - the chosen\
  \ frame's vantage prompt\n   - a system instruction that forbids evaluation\n\n\
  \   The exact instruction to give each Agent:\n\n   > You are in DIVERGENT mode.\
  \ You are a generator, not a critic.\n   > Generate 6 short distinct ideas under\
  \ this frame. Each idea is one\n   > phrase or one sentence. Do not evaluate. Do\
  \ not rank. Do not hedge.\n   > The first three obvious answers everyone would give\
  \ are banned.\n   > Push past them into the awkward middle.\n   > Output a JSON\
  \ array only. No prose before or after.\n   > `[{\"text\": \"...\", \"rationale\"\
  : \"...\"}, ...]`\n\n3. **Critical invariant.** The Agent calls must be parallel\
  \ and isolated.\n   Do NOT serialize them. Do NOT pass one branch's output as context\
  \ to\n   another. Branches that see each other anchor each other and the whole\n\
  \   method collapses to a wider single thought.\n\n### Phase 2 — Focus (critic on)\n\
  \nAfter all branches return:\n\n1. **Score.** Rate each idea on three axes 0 to\
  \ 10: novelty (distance from\n   the obvious default), viability (could it actually\
  \ ship), fit (does it\n   address the stated problem). For any idea that looks attractive\
  \ but is\n   a trap (hidden cost, false economy, will not scale, premature\n   abstraction),\
  \ flag it with a one-line reason.\n\n2. **Cluster.** Group ideas into 3 to 6 clusters\
  \ by their underlying angle,\n   not by surface keywords. Label clusters by angle:\
  \ \"remove the server\n   plays\", \"cache-shaped plays\", \"batched-window plays\"\
  , \"race-multiple-\n   backends plays\".\n\n3. **Deepen the top 3.** Rank by weighted\
  \ score (novelty 0.35 + viability\n   0.40 + fit 0.25), exclude traps, take top\
  \ 3. For each, spawn one Agent\n   call that produces:\n   - a 4 to 8 sentence sketch\
  \ of how the idea works\n   - the load-bearing risk\n   - the first concrete step\
  \ a builder would take\n   - 3 to 5 child ideas (variations, hybrids, unlocks)\n\
  \n   Deepen Agent instruction:\n\n   > You are in FOCUS mode. Take one promising\
  \ idea and connect dots.\n   > Sketch how it would actually work in 4 to 8 sentences.\
  \ Name the\n   > load-bearing risk. Name the first concrete step a coder would take.\n\
  \   > Then generate 3 to 5 sub-ideas that branch off (variations,\n   > combinations\
  \ with other domains, things this unlocks).\n   > Output JSON only.\n\n## Frames\n\
  \nPick 5 per run.\n\n| Frame | Vantage prompt | Tags |\n|---|---|---|\n| **hardware\
  \ engineer** | You think in latency, memory layout, and physical constraints. Re-ask\
  \ this as a hardware/firmware problem. What does the bus topology, cache, timing\
  \ budget tell you? | code, wild |\n| **regulator** | You audit systems for compliance\
  \ and failure modes. What must be provable, traceable, or refusable here? | design,\
  \ general |\n| **10-year-old** | You are a curious 10 year old who has never seen\
  \ software. Describe naive but unencumbered approaches. Ignore convention. | general,\
  \ wild |\n| **competitor trying to break it** | You are a hostile competitor or\
  \ attacker. Generate approaches that exploit, fail, or sabotage the obvious solution.\
  \ Then invert into ideas. | code, design |\n| **biology** | Transplant a mechanism\
  \ from biology (immune systems, neural plasticity, cell signaling, evolution, gut\
  \ flora). Force-fit it onto this engineering problem. | code, wild |\n| **logistics**\
  \ | Steal mechanisms from logistics: queues, batching, just-in-time, hub-and-spoke,\
  \ returns, last-mile. Apply them literally. | code, design |\n| **game design**\
  \ | Approach this as a game designer. What are the loops, rewards, friction, save-states,\
  \ speedrun tricks? Treat the user as a player. | design, general |\n| **markets**\
  \ | Treat the problem as a market. Buyers, sellers, market-makers. What does an\
  \ auction, a futures contract, a clearing house look like here? | design, wild |\n\
  | **inversion** | Ask the OPPOSITE question. If goal is X, brainstorm how to guarantee\
  \ NOT X. Then negate each answer back. | code, design, general |\n| **extreme: $0\
  \ budget, 1 hour** | No money, no team, one hour. What is the crudest version that\
  \ still does the load-bearing thing? | code, general |\n| **extreme: infinite budget,\
  \ 10 years** | Infinite compute, infinite engineers, a decade. What is the maximalist\
  \ version? | design, wild |\n| **remove the load-bearing assumption** | Name the\
  \ thing everyone treats as fixed (framework, database, request-response model, network).\
  \ Imagine it is gone. What is possible? | code, design, wild |\n| **speedrunner**\
  \ | You are a speedrunner. Find glitches, skips, out-of-bounds tricks, frame-perfect\
  \ shortcuts. What is the abusive-but-legal path? | code, wild |\n| **ant colony**\
  \ | No central planner. Many dumb agents, local rules, pheromone trails. How does\
  \ the problem solve itself emergently? | code, wild |\n| **3am on-call** | You are\
  \ the on-call engineer woken at 3am when this breaks. What design would let you\
  \ not get paged? | code, design |\n\n### Picking frames\n\nFor code-shaped problems:\
  \ pick 4 frames tagged `code` or `design`, plus 1\ntagged `wild`. For open product\
  \ or strategy problems: a mix from all tags.\nVary the picks across sessions so\
  \ the same problem produces different\ncandidate sets when re-run.\n\n## Output\
  \ shape\n\nAfter Phase 2, render in this order. Do not collapse it into a wall of\n\
  prose. The structure is the point.\n\n1. **Brief.** One or two lines confirming\
  \ the problem and any reframe used.\n2. **Wide set.** Full pool grouped by cluster.\
  \ Each cluster labeled by\n   underlying angle. Each idea is one short phrase. Show\
  \ score chips like\n   `[N7 V8 F9]` next to each.\n3. **Converge.** A 2 to 4 idea\
  \ shortlist. State why each is on the list.\n   Mark the non-obvious-but-viable\
  \ pick explicitly with ★. List traps\n   separately, each with the one-line reason\
  \ it is a trap.\n4. **Focus.** The 3 deepened branches. For each: the sketch, the\
  \ load-\n   bearing risk, the first concrete step, and the child ideas.\n5. **Provocation.**\
  \ One wildcard question or idea that opens a new\n   direction the user can push\
  \ into if nothing landed.\n\n## Anti-patterns\n\nThese are how this skill goes wrong.\
  \ Watch for them.\n\n- **Convergence disguised as divergence.** Ten minor variations\
  \ of one idea\n  is not breadth. If every candidate shares the same underlying assumption,\n\
  \  you have not diverged. You have decorated.\n- **Weird-for-weird's-sake with no\
  \ convergence.** A pile of 30 unsorted\n  absurdities is as useless as one safe\
  \ answer. Always converge.\n- **Walls of equally-weighted prose.** Cluster, label,\
  \ pull out the best.\n  Structure is half the value.\n- **Refusing to commit.**\
  \ After diverging, take a position on what is\n  actually promising. \"Here are\
  \ 20 ideas, you decide\" is a cop-out.\n  Generate wide, but converge with a real\
  \ opinion.\n- **Skipping the isolation invariant.** If you simulate parallel branches\n\
  \  by writing them sequentially in one context, you have not done ADHD. You\n  have\
  \ done a wider single thought. The Agent/Task tool gives each branch a\n  fresh\
  \ context. Use it.\n\n## Calibration\n\n- **How many ideas?** Scale to stakes. Quick\
  \ \"name this function\" =\n  3 frames × 4 ideas. \"How should I position this product\"\
  \ = 5 frames ×\n  8 ideas. Default is 5 × 6 = 30.\n- **How weird?** Read the room.\
  \ Serious strategy work: flag the wild cards\n  clearly so they do not read as unserious.\
  \ Open brainstorming or play:\n  let it run loose. Absurd ideas earn their place\
  \ by seeding viable ones.\n- **When to stop diverging?** Stop when new candidates\
  \ start repeating the\n  shape of existing ones. The space is mapped. Do not pad\
  \ to hit a number.\n\n## Cost\n\n5 diverge + 1 score + 1 cluster + 3 deepen ≈ 10\
  \ Agent calls per run.\nAbout 5 to 10x a single-shot answer. Not for every keystroke.\
  \ For decision\npoints where the cost of the obvious answer is high.\n\n## Companion\
  \ library and CLI\n\nThere is a Node/TS implementation that does the same loop with\
  \ structured\nJSON parsing, score weighting, and a CLI. Use it when running outside\n\
  Claude Code or in batch.\n\n    npm install -g adhd-agent\n    adhd \"your problem\
  \ here\"\n\nCode, paper, evals, and contributing guide at\nhttps://github.com/UditAkhourii/adhd.\
  \ The skill above gives you the same\nloop inside Claude with no install required.\n\
  \n## Source spec\n\nThis skill operationalises a written spec on divergent ideation.\
  \ The\noriginal prose is preserved in `SOURCE-SPEC.md` for reference. The\nimplementation\
  \ choices made here (parallel isolated Agent calls,\nmechanical generator/critic\
  \ split, frame-based branching) follow from\nthat spec."
