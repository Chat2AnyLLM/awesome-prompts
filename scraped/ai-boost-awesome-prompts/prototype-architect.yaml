slug: prototype-architect
title: Prototype Architect
prompt: "# Prototype Architect\n\nBuild a throwaway prototype to flesh out a design\
  \ before committing to it. Routes between two branches — a runnable terminal app\
  \ for state/business-logic questions, or several radically different UI variations\
  \ toggleable from one route. Use when the user wants to prototype, sanity-check\
  \ a data model or state machine, mock up a UI, explore design options, or says \"\
  prototype this\", \"let me play with it\", \"try a few designs\".\n\nA prototype\
  \ is **throwaway code that answers a question**. The question decides the shape.\n\
  \n## Pick a branch\n\nIdentify which question is being answered — from the user's\
  \ prompt, the surrounding code, or by asking if the user is around:\n\n- **\"Does\
  \ this logic / state model feel right?\"** → Logic Prototype. Build a tiny interactive\
  \ terminal app that pushes the state machine through cases that are hard to reason\
  \ about on paper.\n- **\"What should this look like?\"** → UI Prototype. Generate\
  \ several radically different UI variations on a single route, switchable via a\
  \ URL search param and a floating bottom bar.\n\nThe two branches produce very different\
  \ artifacts — getting this wrong wastes the whole prototype. If the question is\
  \ genuinely ambiguous and the user isn't reachable, default to whichever branch\
  \ better matches the surrounding code (a backend module → logic; a page or component\
  \ → UI) and state the assumption at the top of the prototype.\n\n## Rules that apply\
  \ to both\n\n1. **Throwaway from day one, and clearly marked as such.** Locate the\
  \ prototype code close to where it will actually be used (next to the module or\
  \ page it's prototyping for) so context is obvious — but name it so a casual reader\
  \ can see it's a prototype, not production. For throwaway UI routes, obey whatever\
  \ routing convention the project already uses; don't invent a new top-level structure.\n\
  2. **One command to run.** Whatever the project's existing task runner supports\
  \ — `pnpm <name>`, `python <path>`, `bun <path>`, etc. The user must be able to\
  \ start it without thinking.\n3. **No persistence by default.** State lives in memory.\
  \ Persistence is the thing the prototype is _checking_, not something it should\
  \ depend on. If the question explicitly involves a database, hit a scratch DB or\
  \ a local file with a clear \"PROTOTYPE — wipe me\" name.\n4. **Skip the polish.**\
  \ No tests, no error handling beyond what makes the prototype _runnable_, no abstractions.\
  \ The point is to learn something fast and then delete it.\n5. **Surface the state.**\
  \ After every action (logic) or on every variant switch (UI), print or render the\
  \ full relevant state so the user can see what changed.\n6. **Delete or absorb when\
  \ done.** When the prototype has answered its question, either delete it or fold\
  \ the validated decision into the real code — don't leave it rotting in the repo.\n\
  \n## When done\n\nThe _answer_ is the only thing worth keeping from a prototype.\
  \ Capture it somewhere durable (commit message, ADR, issue, or a `NOTES.md` next\
  \ to the prototype) along with the question it was answering. If the user is around,\
  \ that capture is a quick conversation; if not, leave the placeholder so they (or\
  \ you, on the next pass) can fill in the verdict before deleting the prototype.\n\
  \n---\n\n## Logic Prototype\n\nA tiny interactive terminal app that lets the user\
  \ drive a state model by hand. Use this when the question is about **business logic,\
  \ state transitions, or data shape** — the kind of thing that looks reasonable on\
  \ paper but only feels wrong once you push it through real cases.\n\n### When this\
  \ is the right shape\n\n- \"I'm not sure if this state machine handles the edge\
  \ case where X then Y.\"\n- \"Does this data model actually let me represent the\
  \ case where...\"\n- \"I want to feel out what the API should look like before writing\
  \ it.\"\n- Anything where the user wants to **press buttons and watch state change**.\n\
  \nIf the question is \"what should this look like\" — wrong branch. Use UI Prototype\
  \ below.\n\n### Process\n\n#### 1. State the question\n\nBefore writing code, write\
  \ down what state model and what question you're prototyping. One paragraph, in\
  \ the prototype's README or a comment at the top of the file. A logic prototype\
  \ that answers the wrong question is pure waste — make the question explicit so\
  \ it can be checked later, whether the user is watching now or returning to it AFK.\n\
  \n#### 2. Pick the language\n\nUse whatever the host project uses. If the project\
  \ has no obvious runtime (e.g. a docs repo), ask.\n\nMatch the project's existing\
  \ conventions for tooling — don't add a new package manager or runtime just for\
  \ the prototype.\n\n#### 3. Isolate the logic in a portable module\n\nPut the actual\
  \ logic — the bit that's answering the question — behind a small, pure interface\
  \ that could be lifted out and dropped into the real codebase later. The TUI around\
  \ it is throwaway; the logic module shouldn't be.\n\nThe right shape depends on\
  \ the question:\n\n- **A pure reducer** — `(state, action) => state`. Good when\
  \ actions are discrete events and state is a single value.\n- **A state machine**\
  \ — explicit states and transitions. Good when \"which actions are even legal right\
  \ now\" is part of the question.\n- **A small set of pure functions** over a plain\
  \ data type. Good when there's no implicit current state — just transformations.\n\
  - **A class or module with a clear method surface** when the logic genuinely owns\
  \ ongoing internal state.\n\nPick whichever shape best fits the question being asked,\
  \ _not_ whichever is easiest to wire to a TUI. Keep it pure: no I/O, no terminal\
  \ code, no `console.log` for control flow. The TUI imports it and calls into it;\
  \ nothing flows the other direction.\n\nThis is what makes the prototype useful\
  \ past its own lifetime. When the question's been answered, the validated reducer\
  \ / machine / function set can be lifted into the real module — the TUI shell gets\
  \ deleted.\n\n#### 4. Build the smallest TUI that exposes the state\n\nBuild it\
  \ as a **lightweight TUI** — on every tick, clear the screen (`console.clear()`\
  \ / `print(\"\\033[2J\\033[H\")` / equivalent) and re-render the whole frame. The\
  \ user should always see one stable view, not an ever-growing scrollback.\n\nEach\
  \ frame has two parts, in this order:\n\n1. **Current state**, pretty-printed and\
  \ diff-friendly (one field per line, or formatted JSON). Use **bold** for field\
  \ names or section headers and **dim** for less important context (timestamps, IDs,\
  \ derived values). Native ANSI escape codes are fine — `\\x1b[1m` bold, `\\x1b[2m`\
  \ dim, `\\x1b[0m` reset. No need to pull in a styling library unless one is already\
  \ in the project.\n2. **Keyboard shortcuts**, listed at the bottom: `[a] add user\
  \  [d] delete user  [t] tick clock  [q] quit`. Bold the key, dim the description,\
  \ or vice-versa — whatever reads cleanly.\n\nBehaviour:\n\n1. **Initialise state**\
  \ — a single in-memory object/struct. Render the first frame on start.\n2. **Read\
  \ one keystroke (or one line)** at a time, dispatch to a handler that mutates state.\n\
  3. **Re-render** the full frame after every action — don't append, replace.\n4.\
  \ **Loop until quit.**\n\nThe whole frame should fit on one screen.\n\n#### 5. Make\
  \ it runnable in one command\n\nAdd a script to the project's existing task runner\
  \ (`package.json` scripts, `Makefile`, `justfile`, `pyproject.toml`). The user should\
  \ run `pnpm run <prototype-name>` or equivalent — never need to remember a path.\n\
  \nIf the host project has no task runner, just put the command at the top of the\
  \ prototype's README.\n\n#### 6. Hand it over\n\nGive the user the run command.\
  \ They'll drive it themselves; the interesting moments are when they say \"wait,\
  \ that shouldn't be possible\" or \"huh, I assumed X would be different\" — those\
  \ are the bugs in the _idea_, which is the whole point. If they want new actions\
  \ added, add them. Prototypes evolve.\n\n#### 7. Capture the answer\n\nWhen the\
  \ prototype has done its job, the answer to the question is the only thing worth\
  \ keeping. If the user is around, ask what it taught them. If not, leave a `NOTES.md`\
  \ next to the prototype so the answer can be filled in (or filled in by you, if\
  \ you've watched the session) before the prototype gets deleted.\n\n### Anti-patterns\n\
  \n- **Don't add tests.** A prototype that needs tests is no longer a prototype.\n\
  - **Don't wire it to the real database.** Use an in-memory store unless the question\
  \ is specifically about persistence.\n- **Don't generalise.** No \"what if we wanted\
  \ to support X later.\" The prototype answers one question.\n- **Don't blur the\
  \ logic and the TUI together.** If the reducer / state machine references `console.log`,\
  \ prompts, or terminal escape codes, it's no longer portable. Keep the TUI as a\
  \ thin shell over a pure module.\n- **Don't ship the TUI shell into production.**\
  \ The shell is optimised for being driven by hand from a terminal. The logic module\
  \ behind it is the bit worth keeping.\n\n---\n\n## UI Prototype\n\nGenerate **several\
  \ radically different UI variations** on a single route, switchable from a floating\
  \ bottom bar. The user flips between variants in the browser, picks one (or steals\
  \ bits from each), then throws the rest away.\n\nIf the question is about logic/state\
  \ rather than what something looks like — wrong branch. Use Logic Prototype above.\n\
  \n### When this is the right shape\n\n- \"What should this page look like?\"\n-\
  \ \"I want to see a few options for this dashboard before committing.\"\n- \"Try\
  \ a different layout for the settings screen.\"\n- Any time the user would otherwise\
  \ spend a day picking between three vague mockups in their head.\n\n### Two sub-shapes\
  \ — strongly prefer sub-shape A\n\nA UI prototype is much easier to judge when it's\
  \ **butting up against the rest of the app** — real header, real sidebar, real data,\
  \ real density. A throwaway route on its own is a vacuum: every variant looks fine\
  \ in isolation. Default to sub-shape A whenever there's a plausible existing page\
  \ to host the variants. Only reach for sub-shape B if the prototype genuinely has\
  \ no nearby home.\n\n#### Sub-shape A — adjustment to an existing page (preferred)\n\
  \nThe route already exists. Variants are rendered **on the same route**, gated by\
  \ a `?variant=` URL search param. The existing data fetching, params, and auth all\
  \ stay — only the rendering swaps. This is the default; pick it unless there's a\
  \ specific reason not to.\n\nIf the prototype is for something that doesn't yet\
  \ have a page but *would naturally live inside one* (a new section of the dashboard,\
  \ a new card on the settings screen, a new step in an existing flow) — that's still\
  \ sub-shape A. Mount the variants inside the host page.\n\n#### Sub-shape B — a\
  \ new page (last resort)\n\nOnly use this when the thing being prototyped genuinely\
  \ has no existing page to live inside — e.g. an entirely new top-level surface,\
  \ or a flow that can't be embedded anywhere sensible.\n\nCreate a **throwaway route**\
  \ following whatever routing convention the project already uses — don't invent\
  \ a new top-level structure. Name it so it's obviously a prototype (e.g. include\
  \ the word `prototype` in the path or filename). Same `?variant=` pattern.\n\nBefore\
  \ committing to sub-shape B, sanity-check: is there really no existing page this\
  \ could be embedded in? An empty route hides design problems that a populated one\
  \ would expose.\n\nIn both sub-shapes the floating bottom bar is identical.\n\n\
  ### Process\n\n#### 1. State the question and pick N\n\nDefault to **3 variants**.\
  \ More than 5 stops being radically different and starts being noise — cap there.\n\
  \nWrite down the plan in one line, in the prototype's location or a top-of-file\
  \ comment:\n\n> \"Three variants of the settings page, switchable via `?variant=`,\
  \ on the existing `/settings` route.\"\n\nThis works whether the user is here to\
  \ push back or not.\n\n#### 2. Generate radically different variants\n\nDraft each\
  \ variant. Hold each one to:\n\n- The page's purpose and the data it has access\
  \ to.\n- The project's component library / styling system (TailwindCSS, shadcn,\
  \ MUI, plain CSS, whatever).\n- A clear exported component name, e.g. `VariantA`,\
  \ `VariantB`, `VariantC`.\n\nVariants must be **structurally different** — different\
  \ layout, different information hierarchy, different primary affordance, not just\
  \ different colours. Three slightly-tweaked card grids isn't a UI prototype, it's\
  \ wallpaper. If two drafts come out too similar, redo one with explicit \"do not\
  \ use a card grid\" guidance.\n\n#### 3. Wire them together\n\nCreate a single switcher\
  \ component on the route:\n\n```tsx\n// pseudo-code — adapt to the project's framework\n\
  const variant = searchParams.get('variant') ?? 'A';\nreturn (\n  <>\n    {variant\
  \ === 'A' && <VariantA {...data} />}\n    {variant === 'B' && <VariantB {...data}\
  \ />}\n    {variant === 'C' && <VariantC {...data} />}\n    <PrototypeSwitcher variants={['A','B','C']}\
  \ current={variant} />\n  </>\n);\n```\n\nFor sub-shape A (existing page): keep\
  \ all the existing data fetching above the switcher; only the rendered subtree changes\
  \ per variant.\n\nFor sub-shape B (new page): the throwaway route under `/prototype/<name>`\
  \ mounts the same switcher.\n\n#### 4. Build the floating switcher\n\nA small fixed-position\
  \ bar at the bottom-centre of the screen with three pieces:\n\n- **Left arrow**\
  \ — cycles to the previous variant (wraps around).\n- **Variant label** — shows\
  \ the current variant key and, if the variant exports a name, that name too. e.g.\
  \ `B — Sidebar layout`.\n- **Right arrow** — cycles forward (wraps around).\n\n\
  Behaviour:\n\n- Clicking an arrow updates the URL search param (use the framework's\
  \ router — `router.replace` on Next, `navigate` on React Router, etc) so the variant\
  \ is shareable and reload-stable.\n- Keyboard: `←` and `→` arrow keys also cycle.\
  \ Don't intercept arrow keys when an `<input>`, `<textarea>`, or `[contenteditable]`\
  \ is focused.\n- Visually distinct from the page (e.g. high-contrast pill, subtle\
  \ shadow) so it's obviously not part of the design being evaluated.\n- Hidden in\
  \ production builds — gate on `process.env.NODE_ENV !== 'production'` or an equivalent\
  \ check, so a stray prototype merge can't ship the bar to users.\n\nPut the switcher\
  \ in a single shared component so both sub-shapes can reuse it. Locate it wherever\
  \ shared UI lives in the project.\n\n#### 5. Hand it over\n\nSurface the URL (and\
  \ the `?variant=` keys). The user will flip through whenever they get to it. The\
  \ interesting feedback is usually **\"I want the header from B with the sidebar\
  \ from C\"** — that's the actual design they want.\n\n#### 6. Capture the answer\
  \ and clean up\n\nOnce a variant has won, write down which one and why (commit message,\
  \ ADR, issue, or a `NOTES.md` next to the prototype if running AFK and the user\
  \ hasn't responded yet). Then:\n\n- **Sub-shape A** — delete the losing variants\
  \ and the switcher; fold the winner into the existing page.\n- **Sub-shape B** —\
  \ promote the winning variant to a real route, delete the throwaway route and the\
  \ switcher.\n\nDon't leave variant components or the switcher lying around. They\
  \ rot fast and confuse the next reader.\n\n### Anti-patterns\n\n- **Variants that\
  \ differ only in colour or copy.** That's a tweak, not a prototype. Real variants\
  \ disagree about structure.\n- **Sharing too much code between variants.** A shared\
  \ `<Header>` is fine; a shared `<Layout>` defeats the point. Each variant should\
  \ be free to throw out the layout.\n- **Wiring variants to real mutations.** Read-only\
  \ prototypes are fine. If a variant needs to mutate, point it at a stub — the question\
  \ is \"what should this look like\", not \"does the backend work\".\n- **Promoting\
  \ the prototype directly to production.** The variant code was written under prototype\
  \ constraints (no tests, minimal error handling). Rewrite it properly when you fold\
  \ it in."
