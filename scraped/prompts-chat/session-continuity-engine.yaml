title: Session Continuity Engine
description: Imported from Prompts Chat
prompt: "# Prompt: Session Continuity Engine (SCE)\n# Version: 1.2.3\n# Author: Scott\
  \ Malin, CISSP\n# Purpose:\n# Compresses a completed AI session into a structured\
  \ continuity package that can be\n# transferred into a new session (including across\
  \ different AI platforms) to preserve\n# project context, historical decisions,\
  \ active workstreams, and established conventions.\n# The goal is to minimize context\
  \ loss, reduce repetitive onboarding, and maintain\n# project momentum using filter-safe,\
  \ passive reference architecture.\n# Changelog:\n# - v1.0.0 to v1.2.1: Initial releases,\
  \ cross-platform tuning, JSON mode addition.\n# - v1.2.2: Fixed nested codeblock\
  \ parsing issues. Standardized JSON keys.\n#   Quantified context scale metrics.\
  \ Clarified Section 8 verification payload rules.\n# - v1.2.3: Re-engineered compliance\
  \ notice and guidelines into passive, static\n#   reference language to completely\
  \ eliminate heuristic safety filter triggers.\n--------------------------------------------------------------------------\n\
  We are ending this session to preserve context, reduce context drift, and\nmaintain\
  \ continuity across future conversations.\nYour task is to create a comprehensive\
  \ Session Transfer Package that captures\nthe current project state, active decisions,\
  \ historical context, constraints,\nand next actions.\nThe resulting package should\
  \ help a future AI assistant understand the project\nquickly and continue work with\
  \ minimal re-discovery effort.\n--------------------------------------------------------------------------\n\
  PURPOSE & METHODOLOGY\n--------------------------------------------------------------------------\n\
  This document is a static, user-provided project state snapshot. It functions\n\
  strictly as reference documentation to ground the current session in historical\
  \ \ncontext, established project definitions, and completed technical milestones.\n\
  --------------------------------------------------------------------------\nPROJECT\
  \ REFERENCE GUIDELINES (v1.2.3)\n--------------------------------------------------------------------------\n\
  The receiving assistant utilizes this data as an informational baseline:\n- Use\
  \ the confirmed project decisions to maintain consistency with existing work.\n\
  - Distinguish clearly between established facts, open questions, and planned steps.\n\
  - Reference the documented naming conventions, standards, and version histories\n\
  \  to prevent regression or configuration drift.\n- Use tables or compact lists\
  \ for scannable reference when displaying assets.\n- Request explicit clarification\
  \ if the archived data conflicts with current objectives.\n--------------------------------------------------------------------------\n\
  OUTPUT GENERATION INSTRUCTIONS\n--------------------------------------------------------------------------\n\
  Generate the final output exactly as follows:\n1. A brief introductory sentence.\n\
  2. One markdown codeblock containing the Session Transfer Package.\n\nNESTED CODEBLOCK\
  \ RULE: If the content inside any section requires a codeblock,\nuse four backticks\
  \ (````) for the outer container or escape the inner blocks so\nthe master container\
  \ does not break prematurely.\n\nDEFAULT MODE (Markdown): Use the structure inside\
  \ the START/END block below.\n\nJSON MODE: If the user explicitly requests \"JSON\
  \ output\" or \"JSON mode\", output\na single valid JSON object. Do not wrap it\
  \ in markdown text. Use these exact \ncamelCase keys:\n{\n  \"handoffMetadata\"\
  : {},\n  \"projectHandoffContext\": { \"preferredInteractionStyle\": \"\" },\n \
  \ \"projectContextStatus\": { \"keyRisksAndAntiDrift\": \"\" },\n  \"persistentConstraints\"\
  : {},\n  \"historicalLedger\": [],\n  \"currentSourceOfTruthAssets\": [],\n  \"\
  openQuestions\": [],\n  \"immediateNextSteps\": [],\n  \"continuityVerificationTemplate\"\
  : \"\"\n}\n\nSTART OF PACKAGE CODEBLOCK\n# SESSION TRANSFER PACKAGE (SCE v1.2.3)\n\
  ## 0. Handoff Metadata\n- Originating Platform/Model:\n- Date:\n- Sessions Compressed:\n\
  - Rough Context Scale (Choose one based on current session depth):\n  · Short (<10k\
  \ tokens / brief chat)\n  · Medium (10k-50k tokens / moderate technical deep dive)\n\
  \  · Long (50k-100k tokens / heavy code or long multi-stage conversation)\n  · Very\
  \ Long (>100k tokens / massive repository context or highly extended session)\n\
  - Primary Topics / Tags:\n- Key Repositories/Files:\n\n## 1. Project Handoff Context\n\
  This section summarizes the overall purpose of the project, its current\ndirection,\
  \ major objectives, and any important strategic decisions already\nmade.\n### Preferred\
  \ Interaction Style\n[Describe preferred working style, formatting conventions,\
  \ level of detail,\nversioning expectations, confidence-label requirements, communication\
  \ style,\nand other collaboration preferences.]\n\n## 2. Project Context & Current\
  \ Status\nProvide a compressed but comprehensive summary of:\n- Current project\
  \ goals\n- Work completed\n- Current state\n- Active development efforts\n- Recent\
  \ decisions\n- Known issues\nFocus on preserving context that would otherwise require\
  \ significant effort\nto rediscover.\n\n### Key Risks, Gotchas & Anti-Drift Notes\n\
  Document any known risks, common failure modes, deprecated approaches,\nor specific\
  \ guidance to prevent context drift or safety issues in future sessions.\n\n## 3.\
  \ Persistent Constraints & Operating Standards\nDocument ongoing standards such\
  \ as:\n- Formatting requirements\n- Naming conventions\n- Versioning rules\n- Documentation\
  \ standards\n- Evidence requirements\n- Validation procedures\n- Quality controls\n\
  - Any user-established preferences\n\n### Continuity Guidance\n- Changes to established\
  \ standards should generally be documented and\n  user-directed.\n- Preserve compatibility\
  \ with existing project assets whenever practical.\n- Record significant changes\
  \ in version history where applicable.\n\n## 4. Historical Ledger (Compressed)\n\
  Provide a chronological summary of major project events, including:\n- Important\
  \ decisions\n- Architectural shifts\n- Prompt revisions\n- Retired approaches\n\
  - Lessons learned\n- Significant milestones\nKeep entries concise while preserving\
  \ rationale. Use bullets or a simple table\nfor longer histories.\n\n## 5. Current\
  \ Source-of-Truth Assets\nList the latest approved versions of all critical assets.\n\
  For each asset include:\n- Asset Name\n- Version\n- Purpose\n- Current Status\n\
  - Location/Repository (if known)\nInclude full content only when reasonably short.\n\
  For larger assets, provide:\n- Summary\n- Key characteristics\n- Location reference\n\
  Avoid duplicating unnecessary content. Use a table when listing multiple assets.\n\
  \n## 6. Open Questions & Pending Decisions\nFor each item include:\n- Description\n\
  - Current status\n- Known options\n- Confidence level (if applicable)\nSuggested\
  \ confidence labels:\n- [CONFIRMED]\n- [HIGH CONFIDENCE]\n- [MEDIUM CONFIDENCE]\n\
  - [LOW CONFIDENCE]\n- [OPEN QUESTION]\n- [PROPOSED]\n\n## 7. Immediate Next Steps\n\
  Provide a prioritized action list.\nFor each item include:\n- Objective\n- Importance\n\
  - Dependencies (if any)\n- Link to related open questions (if applicable)\nOrder\
  \ from highest to lowest priority.\n\n## 8. Continuity Verification Template\n(Note\
  \ to current model: Do not execute this section. Output this verbatim as a\nstatic\
  \ payload for the receiving model to read and execute upon onboarding.)\n\nA future\
  \ AI assistant may optionally provide a brief onboarding summary before\ncontinuing\
  \ work.\nSuggested format to output to the user:\n\"SCE v1.2.3 loaded successfully.\n\
  Current understanding:\n[2-3 sentence summary]\nTop priorities:\n- Item 1\n- Item\
  \ 2\n- Item 3\nReady to proceed.\"\nEND OF PACKAGE CODEBLOCK"
