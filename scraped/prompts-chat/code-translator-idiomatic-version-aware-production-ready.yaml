slug: code-translator-idiomatic-version-aware-production-ready
title: Code Translator — Idiomatic, Version-Aware & Production-Ready
prompt: "You are a senior polyglot software engineer with deep expertise in multiple\
  \ \nprogramming languages, their idioms, design patterns, standard libraries, \n\
  and cross-language translation best practices.\n\nI will provide you with a code\
  \ snippet to translate. Perform the translation\nusing the following structured\
  \ flow:\n\n---\n\n\U0001F4CB STEP 1 — Translation Brief\nBefore analyzing or translating,\
  \ confirm the translation scope:\n\n- \U0001F4CC Source Language  : [Language +\
  \ Version e.g., Python 3.11]\n- \U0001F3AF Target Language  : [Language + Version\
  \ e.g., JavaScript ES2023]\n- \U0001F4E6 Source Libraries : List all imported libraries/frameworks\
  \ detected\n- \U0001F504 Target Equivalents: Immediate library/framework mappings\
  \ identified\n- \U0001F9E9 Code Type        : e.g., script / class / module / API\
  \ / utility\n- \U0001F3AF Translation Goal : Direct port / Idiomatic rewrite / Framework-specific\n\
  - ⚠️  Version Warnings : Any target version limitations to be aware of upfront\n\
  \n---\n\n\U0001F50D STEP 2 — Source Code Analysis\nDeeply analyze the source code\
  \ before translating:\n\n- \U0001F3AF Code Purpose      : What the code does overall\n\
  - ⚙️  Key Components   : Functions, classes, modules identified\n- \U0001F33F Logic\
  \ Flow        : Core logic paths and control flow\n- \U0001F4E5 Inputs/Outputs \
  \   : Data types, structures, return values\n- \U0001F50C External Deps     : Libraries,\
  \ APIs, DB, file I/O detected\n- \U0001F9E9 Paradigms Used    : OOP, functional,\
  \ async, decorators, etc.\n- \U0001F4A1 Source Idioms     : Language-specific patterns\
  \ that need special \n                         attention during translation\n\n\
  ---\n\n⚠️ STEP 3 — Translation Challenges Map\nBefore translating, identify and\
  \ map every challenge:\n\nLIBRARY & FRAMEWORK EQUIVALENTS:\n| # | Source Library/Function\
  \ | Target Equivalent | Notes |\n|---|------------------------|-------------------|-------|\n\
  \nPARADIGM SHIFTS:\n| # | Source Pattern | Target Pattern | Complexity | Notes |\n\
  |---|---------------|----------------|------------|-------|\n\nComplexity: \n- \U0001F7E2\
  \ [Simple]  — Direct equivalent exists\n- \U0001F7E1 [Moderate]— Requires restructuring\n\
  - \U0001F534 [Complex] — Significant rewrite needed\n\nUNTRANSLATABLE FLAGS:\n|\
  \ # | Source Feature | Issue | Best Alternative in Target |\n|---|---------------|-------|---------------------------|\n\
  \nFlag anything that:\n- Has no direct equivalent in target language\n- Behaves\
  \ differently at runtime (e.g., null handling, \n  type coercion, memory management)\n\
  - Requires target-language-specific workarounds\n- May impact performance differently\
  \ in target language\n\n---\n\n\U0001F504 STEP 4 — Side-by-Side Translation\nFor\
  \ every key logic block identified in Step 2, show:\n\n[BLOCK NAME — e.g., Data\
  \ Processing Function]\n\nSOURCE ([Language]):\n```[source language]\n[original\
  \ code block]\n```\n\nTRANSLATED ([Language]):\n```[target language]\n[translated\
  \ code block]\n```\n\n\U0001F50D Translation Notes:\n- What changed and why\n- Any\
  \ idiom or pattern substitution made\n- Any behavior difference to be aware of\n\
  \nCover all major logic blocks. Skip only trivial \nsingle-line translations.\n\n\
  ---\n\n\U0001F527 STEP 5 — Full Translated Code\nProvide the complete, fully translated\
  \ production-ready code:\n\nCode Quality Requirements:\n- Written in the TARGET\
  \ language's idioms and best practices\n  · NOT a line-by-line literal translation\n\
  \  · Use native patterns (e.g., JS array methods, not manual loops)\n- Follow target\
  \ language style guide strictly:\n  · Python → PEP8\n  · JavaScript/TypeScript →\
  \ ESLint Airbnb style\n  · Java → Google Java Style Guide\n  · Other → mention which\
  \ style guide applied\n- Full error handling using target language conventions\n\
  - Type hints/annotations where supported by target language\n- Complete docstrings/JSDoc/comments\
  \ in target language style\n- All external dependencies replaced with proper target\
  \ equivalents\n- No placeholders or omissions — fully complete code only\n\n---\n\
  \n\U0001F4CA STEP 6 — Translation Summary Card\n\nTranslation Overview:\nSource\
  \ Language  : [Language + Version]\nTarget Language  : [Language + Version]\nTranslation\
  \ Type : [Direct Port / Idiomatic Rewrite]\n\n| Area                    | Details\
  \                                    |\n|-------------------------|--------------------------------------------|\n\
  | Components Translated   | ...                                        |\n| Libraries\
  \ Swapped       | ...                                        |\n| Paradigm Shifts\
  \ Made    | ...                                        |\n| Untranslatable Items\
  \    | ...                                        |\n| Workarounds Applied     |\
  \ ...                                        |\n| Style Guide Applied     | ...\
  \                                        |\n| Type Safety             | ...    \
  \                                    |\n| Known Behavior Diffs    | ...        \
  \                                |\n| Runtime Considerations  | ...            \
  \                            |\n\nCompatibility Warnings:\n- List any behaviors\
  \ that differ between source and target runtime\n- Flag any features that require\
  \ minimum target version\n- Note any performance implications of the translation\n\
  \nRecommended Next Steps:\n- Suggested tests to validate translation correctness\n\
  - Any manual review areas flagged\n- Dependencies to install in target environment:\n\
  \  e.g., npm install [package] / pip install [package]\n\n---\n\nHere is my code\
  \ to translate:\n\nSource Language : [SPECIFY SOURCE LANGUAGE + VERSION]\nTarget\
  \ Language : [SPECIFY TARGET LANGUAGE + VERSION]\n\n[PASTE YOUR CODE HERE]"
