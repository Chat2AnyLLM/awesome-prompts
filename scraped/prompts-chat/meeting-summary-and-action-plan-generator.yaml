slug: meeting-summary-and-action-plan-generator
title: Meeting Summary and Action Plan Generator
description: Imported from Prompts Chat
prompt: "Summarize the meeting transcript by performing the following tasks:\n\n-\
  \ **State the Meeting Objective**: Begin with a brief paragraph (2-3 sentences)\
  \ explaining the overall objective or purpose of the meeting based on the content\
  \ provided.\n- **Meeting Summary**: Write a concise summary paragraph (5-8 sentences)\
  \ capturing the main topics discussed and general outcome.\n- **Meeting Title**:\
  \ Create a clear and descriptive title for the meeting.\n- **Discussion Points**:\
  \ List the key discussion points addressed during the meeting in bullet points.\n\
  - **Decisions Made**: Summarize all concrete decisions, resolutions, or agreements\
  \ reached.\n- **Action Items**: List all action items, each assigned to a specific\
  \ individual, including due dates if mentioned.\n\nEnsure that your output follows\
  \ this order:  \n1. Meeting Title  \n2. Meeting Objective  \n3. Meeting Summary\
  \  \n4. Key Discussion Points  \n5. Decisions Made  \n6. Action Items & Responsibilities\n\
  \n**Reasoning Order**:  \n- First, identify the objective and content of the meeting,\
  \ reason through the important points, summarize, and then state any conclusions\
  \ such as assigned tasks, decisions, etc.  \n- Do not start with conclusions or\
  \ lists—always present the reasoning/summary before results or actionables.\n\n\
  **Output Format**:  \nUse markdown formatting, with clearly labeled sections and\
  \ bullet lists where appropriate. Output should be ~2-3 paragraphs for objectives\
  \ and summary, with bullet lists for points, decisions, and action items.\n\n**Example\
  \ Output** (fill in with actual meeting details as appropriate):\n\nMeeting Title:\
  \ [Descriptive Title of Meeting]\n\n**Meeting Objective:**  \nThe objective of this\
  \ meeting was to review the status of the upcoming product launch and address any\
  \ outstanding challenges. Participants discussed current progress, identified roadblocks,\
  \ and set clear next steps to ensure timely delivery.\n\n**Meeting Summary:**  \n\
  During the meeting, team members shared updates on marketing, engineering, and logistics.\
  \ Several potential delays were identified, and alternative solutions were brainstormed.\
  \ The group agreed on prioritizing bug fixes and accelerating outreach efforts.\
  \ Key deadlines were reaffirmed, and new responsibilities were assigned to address\
  \ gaps in readiness.\n\n**Key Discussion Points:**\n- Progress updates from each\
  \ department\n- Major blockers and proposed solutions\n- Resource needs and reallocations\n\
  - Communication plan moving forward\n\n**Decisions Made:**\n- Proceed with expedited\
  \ bug-fix schedule\n- Shift two resources from support to engineering until launch\n\
  - Approve new marketing materials\n\n**Action Items & Responsibilities:**\n- [Alice]\
  \ Finalize bug list by Friday\n- [Ben] Update marketing assets by next Wednesday\n\
  - [Chloe] Coordinate logistics with new suppliers by end of week\n\n**Important:**\
  \  \n- Always begin with objective and summary before listing points, decisions,\
  \ or action items.\n- Be concise, clear, and accurate in capturing meeting highlights.\n\
  \n---\n\n**Reminder:**  \n- Always capture the meeting objective and provide a summary\
  \ first, then enumerate key points, decisions, and responsibilities.  \n- Assign\
  \ all action items explicitly to individuals.  \n- Begin output with a meeting title."
