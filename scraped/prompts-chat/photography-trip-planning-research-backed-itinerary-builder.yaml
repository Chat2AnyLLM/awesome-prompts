title: Photography Trip Planning — Research-Backed Itinerary Builder
description: Imported from Prompts Chat
prompt: "# Photography Trip Planning Prompt\n## Reusable Template for Travel Photographers\n\
  ### v1.0\n\n---\n\n> **Two ways to use this template:**\n>\n> **Lightweight mode**\
  \ — Skip all sections marked `${optional}` and the entire Technical Notes section.\
  \ Fill in your style profile and trip details, then ask Claude for a text-based\
  \ research brief and day-by-day schedule. No scripting required.\n>\n> **Full production\
  \ mode** — Use every section. Claude will produce a PowerPoint slide deck (via Node.js\
  \ + pptxgenjs), an Excel workbook (via Python + openpyxl), and Google Maps CSVs\
  \ — all color-coded and QA'd. Requires comfort running scripts from the command\
  \ line.\n>\n> In both modes: fill in every section marked `${fill_in}`. Sections\
  \ marked `${example}` show what a completed entry looks like — replace them with\
  \ your own details. Sections marked `${optional}` can be removed if not relevant\
  \ to your workflow.\n\n---\n\n## WHO I AM\n\nI am a travel photographer planning\
  \ a trip [with / without] a companion. My name is ${fill_in}. I shoot with [FILL\
  \ IN — e.g., Canon EOS R5 and Sony A7IV]. My lens kit for travel: [FILL IN — e.g.,\
  \ 16-35mm wide, 24-70mm standard, 100mm macro]. I travel with [FILL IN — e.g., a\
  \ carbon fiber travel tripod / no tripod / a compact gorilla-pod]. My travel bag\
  \ is [FILL IN — e.g., Peak Design Travel Backpack 45L with camera cube insert].\n\
  \n---\n\n## MY PHOTOGRAPHIC STYLE\n\nThis is the most important section. Read it\
  \ carefully before suggesting any locations.\n\n**The core subject:** [FILL IN —\
  \ Describe the through-line of your work. What do you photograph and why? What draws\
  \ you to a subject?]\n\n> ${example}: I photograph things that endure — structures,\
  \ landscapes, and moments that exist outside of time. The through-line across my\
  \ work is things built or lived in that now outlive their original purpose, still\
  \ standing.\n\n**Technical signatures:** [FILL IN — List your consistent compositional\
  \ and technical choices.]\n\n> ${example}:\n> - Symmetrical or near-symmetrical\
  \ composition with a strong central vanishing point\n> - Low angle or looking straight\
  \ up to exaggerate scale and eliminate horizon\n> - A single human figure used for\
  \ scale, not as the primary subject\n> - Long exposure or slow shutter to pull motion\
  \ out of water, clouds, and crowds\n> - B&W for structural and decay subjects; color\
  \ when the palette itself is the subject\n> - Strong tonal contrast — I print dark\n\
  > - The underside, interior skeleton, and structural bones of things interest me\
  \ more than facades\n\n**Recurring subject categories:** [FILL IN — List the types\
  \ of places and subjects you consistently seek out.]\n\n> ${example}:\n> - Decay\
  \ and abandonment — things that have outlived their purpose\n> - Sacred spaces with\
  \ weight and edge — not pretty churches, spaces where something happened\n> - Old-meets-industrial\
  \ juxtapositions\n> - Underground and subterranean spaces — crypts, tunnels, ancient\
  \ layers beneath modern cities\n> - Geometric structural form — bridges, piers,\
  \ arches, repeating elements\n> - Quiet and empty streets — I shoot before crowds\
  \ arrive\n> - Atlas Obscura-type locations — the unusual, the hidden, the forgotten\n\
  \n**What I consistently avoid:** [FILL IN — List what you do not want recommended.]\n\
  \n> ${example}:\n> - Postcard framing of famous places\n> - Posed subjects\n> -\
  \ Soft or sentimental light\n> - Crowded tourist spots as primary targets\n> - Markets\
  \ as planned stops (open to stumbling upon them)\n\n---\n\n## TRAVEL COMPANION ${optional}\n\
  \n**${fill_in_or_delete_this_section}** — If you are traveling with a companion,\
  \ describe their interests here so Claude can build a plan that works for both of\
  \ you, not a photographer's itinerary with someone along for the ride.\n\n> ${example}:\
  \ My wife travels with me. She enjoys boutique shopping (not chains or department\
  \ stores), aperitivo culture, neighborhood wandering in places that feel local,\
  \ and unusual cultural experiences including ossuaries and catacombs. She is game\
  \ for off-the-beaten-path locations. Build shared experiences into the plan — she\
  \ is not a separate itinerary to manage.\n\n---\n\n## THE TRIP\n\n**Destination:**\
  \ [FILL IN — e.g., \"Portugal: Lisbon, Porto, Sintra\"]\n**Departure:** [FILL IN\
  \ — e.g., \"LAX, Sept 16, 3:05 PM\"]\n**Return:** [FILL IN — e.g., \"LHR, Sept 28,\
  \ 9:50 AM\"]\n**Outbound arrival:** [FILL IN — e.g., \"LIS (Lisbon), Sept 17, 8:30\
  \ AM\"]\n**Cities and nights:** [FILL IN — e.g., \"Lisbon 4 nights, Porto 3 nights,\
  \ Sintra day trip\"]\n**City-to-city transport:** [FILL IN — e.g., \"Train, Lisbon\
  \ to Porto ~3 hrs\"]\n**Base neighborhoods:** [FILL IN, or ask Claude to recommend\
  \ based on your shooting targets and companion interests]\n\n---\n\n## WHAT I WANT\
  \ CLAUDE TO BUILD\n\n### 1. PowerPoint Slide Deck [OPTIONAL — requires Node.js and\
  \ pptxgenjs]\n\n> This deliverable is for users comfortable running Node.js scripts.\
  \ If you want a simpler output, replace this section with a request for a formatted\
  \ document or PDF.\n\n**Format:** LAYOUT_WIDE (13.3 x 7.5 inches), built with pptxgenjs\
  \ in Node.js. Dark header bar on content slides with accent color labels. Section\
  \ divider slides are full dark background. Version number on cover and filename.\n\
  \n**Badges in slide header:**\n- Red badge: \"★ ADVANCE BOOKING REQUIRED\" — for\
  \ locations requiring pre-purchase tickets\n- Green badge: \"★ ATLAS OBSCURA\" —\
  \ for unusual/hidden locations in that spirit\n- Gold banner: \"SHARED EXPERIENCE\
  \ — not a primary photography target\" — for meaningful shared visits\n\n**Slides\
  \ to include:**\n- Cover (trip title, cities, dates, version number)\n- Itinerary\
  \ overview table (date, verified day of week, event, notes)\n- Light timing table\
  \ per city (blue hour start, golden hour start, sunrise, sunset, golden hour end,\
  \ blue hour end — calculated with Python astral library, exact coordinates, actual\
  \ trip dates)\n- For each city:\n  - City section divider\n  - Base camp slide (why\
  \ this neighborhood, proximity to shooting targets, highlights nearby, transit)\n\
  \  - Location slides for each confirmed shooting target (about, key notes, shot\
  \ list, unconventional perspectives)\n  - Shared experience slides for meaningful\
  \ non-photography visits\n  - High viewpoints slide (card layout, 3 viewpoints,\
  \ flag confirmed closures)\n  - Daily schedule slide(s) — split across multiple\
  \ slides if more than 14 rows; color-coded by category\n  - Optional day trips slide\
  \ (card layout, flag Atlas Obscura picks)\n- Tickets and booking slide (3 columns:\
  \ book in advance / pay on day / free)\n- Gear list slide\n- Aperitivo/food bars\
  \ slide — specific named venues by city, local picks only, with address and description\
  \ [OPTIONAL — remove if not relevant to your destination]\n- Shared activities slide\
  \ (one column per city) ${optional}\n\n**Schedule color coding:**\n- Pre-Dawn Shoot:\
  \ dark blue / light blue text\n- Aperitivo/Food: dark purple / light purple text\n\
  - Shared Activity/Food/Shopping: dark gold / light gold text\n- Free Roam/Optional:\
  \ dark green / light green text\n- Train Travel/Flight: dark gray / light gray text\n\
  - Rest/Breakfast/Checkout: medium gray\n- Advance Booking Required: dark red / light\
  \ red text\n\n---\n\n### 2. Excel Workbook [OPTIONAL — requires Python and openpyxl]\n\
  \n> This deliverable is for users comfortable running Python scripts.\n\n5 tabs:\
  \ MASTER (full trip chronologically including travel days), one tab per city, LEGEND.\n\
  Columns: Date, Day, City, Time, Activity, Category, Duration, Notes.\nSame color\
  \ coding as schedule slides. Freeze panes at A2, hide gridlines, auto-filter on\
  \ headers.\n\n---\n\n### 3. Google Maps CSVs — one per city ${optional}\n\nColumns:\
  \ Name, Description, Category, Best Time, Latitude, Longitude, Address.\n\n**Critical:**\
  \ Use Python csv.writer with utf-8 encoding. No special characters — plain ASCII\
  \ only. Verify coordinates before including.\n\nCategories: Shooting Location, Shared\
  \ Activity, Base, High Viewpoint, Transit, Optional Day Trip, CLOSED - DO NOT USE,\
  \ Atlas Obscura Optional.\n\n**File naming convention:** ${destination}-trip-${year}-v[N].pptx\
  \ / .xlsx / city-locations.csv. Increment version number on each rebuild.\n\n---\n\
  \n## LOCATION RESEARCH STANDARDS\n\n### For each shooting location, provide:\n1.\
  \ **Description** — what it is, why it matters photographically, best conditions,\
  \ connection to my style profile where relevant\n2. **Shot list** — 4–5 standard\
  \ shots worth getting\n3. **Unconventional perspectives** — 3–4 angles or approaches\
  \ most photographers miss, matched to my style profile above\n4. **Key notes** —\
  \ hours, access, cost, transit, proximity to other targets\n5. **Best time** — pre-dawn\
  \ / early morning / morning / afternoon / golden hour\n\n### For each city, also\
  \ research:\n- The best base neighborhood (balancing proximity to shooting targets\
  \ and companion interests)\n- High viewpoints (highest publicly accessible, with\
  \ elevation and cost; confirm current status)\n- Optional day trips (3–4 options\
  \ matched to both my aesthetic and companion interests)\n- Atlas Obscura locations\
  \ that genuinely fit my style — filter carefully, not everything qualifies\n- Specific\
  \ local food/drink venues: local picks only, not tourist-facing, with name, address,\
  \ and what makes them worth going to\n\n### Research and verification requirements:\n\
  - **Verify all locations exist** before including — web search any location you\
  \ are not certain about\n- **Confirm current access status** — search for closures\
  \ before recommending any viewpoint or attraction\n- **Days of week:** always calculate\
  \ with Python datetime for the actual trip year. Never guess.\n- **Light timing:**\
  \ always calculate with Python astral library using exact city coordinates and trip\
  \ dates. Never estimate.\n- **Ticket prices and booking windows:** search for current\
  \ prices — do not rely on training data\n- **Do not hallucinate** — if uncertain\
  \ about a fact, search or say so\n\n---\n\n## ATLAS OBSCURA APPROACH\n\nFilter Atlas\
  \ Obscura picks strictly against your style profile above. Use these as a guide\
  \ for what typically works and what doesn't:\n\n**Strong fits for unusual/hidden\
  \ locations:**\n- Underground or subterranean spaces (crypts, tunnels, ancient layers)\n\
  - Abandoned or decaying spaces (former institutions, industrial ruins)\n- Bone chapels\
  \ and ossuaries\n- Hidden architectural anomalies\n- Sacred spaces that have crossed\
  \ into the uncanny\n\n**Weak fits — generally avoid:**\n- Quirky museums without\
  \ strong visual potential\n- Locations that are historically interesting but not\
  \ photographically compelling\n- Anything requiring illegal access — note if access\
  \ is uncertain and flag for research\n\n---\n\n## PLANNING PROCESS\n\nFollow this\
  \ order:\n\n1. Ask for trip dates, cities, and transport if not provided\n2. Verify\
  \ days of week with Python before doing anything else\n3. Calculate light timing\
  \ with Python astral for all shooting days\n4. Research and propose shooting locations\
  \ — filter against my style profile — ask to confirm before building\n5. Research\
  \ and propose base neighborhoods per city — ask to confirm\n6. Research Atlas Obscura\
  \ picks per city — propose with honest assessment of fit\n7. Research specific local\
  \ food/drink venues per city\n8. Identify advance booking requirements and booking\
  \ windows\n9. Build the schedule — pre-dawn shoots, shared experiences, meals, free\
  \ time\n10. Build all deliverables in one go: PowerPoint, Excel, CSVs\n11. QA slides\
  \ before delivering: convert to PDF via soffice, then pdftoppm -jpeg -r 120, review\
  \ per-slide images\n\n**Batch changes, then rebuild.** Confirm all changes before\
  \ touching any files. Avoid incremental rebuilds.\n\n---\n\n## TECHNICAL NOTES [OPTIONAL\
  \ — relevant only if using the PowerPoint, Excel, or CSV deliverables]\n\n### pptxgenjs:\n\
  - Never pass a lambda as a positional y argument to helper functions — use inline\
  \ `s.addText()` with explicit coordinates\n- Always add `valign: \"top\"` to bulleted\
  \ list text boxes\n- Every bullet array's last item must include `options: { bullet:\
  \ true }` explicitly\n- Never use `#` in hex color values — pass without the hash\n\
  - QA every rebuild: `soffice --headless --convert-to pdf`, then `pdftoppm -jpeg\
  \ -r 120`, review before delivering\n\n### openpyxl:\n- Use `PatternFill(\"solid\"\
  )` for all cell fills\n- Freeze panes at A2 on all data sheets\n- Set `showGridLines\
  \ = False` on all sheets\n- Auto-filter on header rows\n\n### CSVs:\n- Always use\
  \ Python `csv.writer` with utf-8 encoding\n- No special characters — plain ASCII\
  \ only\n- Verify coordinates are accurate before including\n\n### Schedule splits:\n\
  - Split any city schedule across multiple slides if more than 14 data rows\n\n---\n\
  \n## STYLE PREFERENCES\n\n[FILL IN — describe your general planning philosophy.\
  \ Examples below.]\n\n> ${example}:\n> - Quality over quantity — fewer, richer locations\
  \ beat comprehensive lists\n> - Minimal logistics friction — don't route across\
  \ a city when targets can be clustered\n> - Authentic over tourist-facing — if a\
  \ less-visited equivalent exists, recommend it\n> - Pre-dawn access is a priority\n\
  > - The unusual over the famous — Atlas Obscura sensibility throughout\n> - When\
  \ in doubt about a fact, search before answering\n\n---\n\n*Template adapted from\
  \ a working Italy trip planning workflow. Built for travel photographers who want\
  \ a research-backed, production-ready trip plan — not a listicle.*"
